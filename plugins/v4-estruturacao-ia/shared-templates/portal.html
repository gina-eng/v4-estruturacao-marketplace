<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Entregas | V4 Estruturação IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ==========================================================================
       V4 Portal de Entregas — Design System
       Dark Cinema Editorial: Playfair Display × Plus Jakarta Sans
       Colors: Deep Black (#0a0a0a), Warm White (#e5e2e1), V4 Red (#e50914)
       ========================================================================== */

    :root {
      --bg-deep: #050505;
      --bg-base: #0a0a0a;
      --bg-surface: #111111;
      --bg-elevated: #161616;
      --bg-hover: #1a1a1a;
      --border: #1a1a1a;
      --border-mid: #222222;
      --border-strong: #333333;
      --text-primary: #e5e2e1;
      --text-secondary: #999999;
      --text-muted: #666666;
      --text-faint: #444444;
      --accent: #e50914;
      --accent-dim: rgba(229, 9, 20, 0.12);
      --accent-glow: rgba(229, 9, 20, 0.06);
      --success: #22c55e;
      --success-dim: rgba(34, 197, 94, 0.12);
      --warning: #eab308;
      --warning-dim: rgba(234, 179, 8, 0.12);
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.12);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --radius: 8px;
      --radius-lg: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Film Grain Overlay */
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 10000; opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* ===== Typography ===== */
    h1, h2, h3, h4 { font-weight: 700; line-height: 1.2; letter-spacing: -0.01em; }
    h2 { font-size: 1.25rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--accent); display: inline-block; }
    h3 { font-size: 1.0625rem; margin-bottom: 0.75rem; color: #fff; }
    h4 { font-size: 0.9375rem; margin-bottom: 0.5rem; color: #b0adab; }
    p { margin-bottom: 0.75rem; color: #c8c5c3; font-size: 0.9375rem; }
    strong { color: #fff; font-weight: 600; }
    a { color: var(--accent); text-decoration: none; }

    /* ===== Hero ===== */
    .hero {
      text-align: center;
      padding: 4rem 2rem 3rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 120%, var(--accent-glow) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero__badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; background: var(--accent);
      border-radius: 10px; font-family: var(--font-body);
      font-weight: 800; font-size: 1.25rem; color: #fff; margin-bottom: 1.5rem;
    }
    .hero__client {
      font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700; font-style: italic; color: #fff;
      margin-bottom: 0.5rem; letter-spacing: -0.02em;
    }
    .hero__subtitle {
      font-size: 0.8125rem; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.15em; font-weight: 600; margin-bottom: 2.5rem;
    }
    .hero__progress { max-width: 420px; margin: 0 auto; position: relative; z-index: 1; }
    .hero__bar { height: 3px; background: var(--border-mid); border-radius: 2px; overflow: hidden; margin-bottom: 0.75rem; }
    .hero__fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0; transition: width 1.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .hero__label { font-size: 0.8125rem; color: var(--text-secondary); font-weight: 500; }

    /* ===== Timeline Nav ===== */
    .timeline {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10, 10, 10, 0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem; display: flex; justify-content: center; gap: 0.25rem;
      overflow-x: auto; scrollbar-width: none;
    }
    .timeline::-webkit-scrollbar { display: none; }
    .tl-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;
      transition: background 0.2s; white-space: nowrap; border: none;
      background: none; color: inherit; font-family: inherit; font-size: 0.75rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .tl-item:hover { background: var(--bg-surface); }
    .tl-item--active .tl-label { color: var(--accent); }
    .tl-dot {
      width: 8px; height: 8px; border-radius: 50%; border: 2px solid var(--border-strong); flex-shrink: 0;
    }
    .tl-dot--done { background: var(--accent); border-color: var(--accent); }
    .tl-dot--current { border-color: var(--accent); animation: pulse 2s infinite; }
    .tl-dot--has-progress { border-color: var(--warning); }
    .tl-label { color: var(--text-secondary); transition: color 0.2s; }

    /* ===== Weeks ===== */
    .weeks { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }
    .week {
      margin-bottom: 0.75rem; border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; background: var(--bg-base);
      transition: border-color 0.3s;
    }
    .week--current { border-color: rgba(229, 9, 20, 0.25); }
    .week__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.75rem; cursor: pointer; background: none;
      border: none; width: 100%; text-align: left; color: inherit;
      font-family: inherit; transition: background 0.2s; position: relative;
    }
    .week__header:hover { background: var(--bg-surface); }
    .week__ghost {
      font-family: var(--font-display); font-size: 7rem; font-weight: 700;
      color: var(--accent-glow); position: absolute; right: 1.5rem;
      top: 50%; transform: translateY(-50%); line-height: 1; pointer-events: none;
      user-select: none;
    }
    .week__info { flex: 1; position: relative; z-index: 1; }
    .week__tag {
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.125rem;
    }
    .week__title {
      font-family: var(--font-display); font-size: 1.375rem; font-weight: 700;
      color: #fff; margin-bottom: 0.125rem;
    }
    .week__desc { font-size: 0.8125rem; color: var(--text-muted); }
    .week__meta {
      display: flex; align-items: center; gap: 0.75rem;
      position: relative; z-index: 1; margin-right: 1.5rem;
    }
    .week__count { font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
    .week__minibar { width: 60px; height: 3px; background: var(--border-mid); border-radius: 2px; overflow: hidden; }
    .week__minibar-fill { height: 100%; background: var(--accent); border-radius: 2px; }
    .week__chev {
      font-size: 0.625rem; color: var(--text-muted); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative; z-index: 1; flex-shrink: 0;
    }
    .week__chev--open { transform: rotate(180deg); }
    .week__body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .week__content { padding: 0 1.75rem 1.75rem; }

    /* ===== Skills ===== */
    .skill { padding: 1.25rem 0; border-top: 1px solid var(--border); }
    .skill:first-child { border-top: none; }
    .skill__head { display: flex; align-items: center; gap: 0.625rem; }
    .skill__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .skill__dot--done { background: var(--success); }
    .skill__dot--wip { background: var(--warning); animation: pulse 2s infinite; }
    .skill__dot--wait { background: var(--border-strong); }
    .skill__name { font-size: 1rem; font-weight: 600; color: #fff; flex: 1; }
    .skill--pending .skill__name { color: var(--text-muted); }
    .skill__badge {
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 0.2em 0.6em; border-radius: 4px;
    }
    .skill__badge--done { background: var(--success-dim); color: var(--success); }
    .skill__badge--wip { background: var(--warning-dim); color: var(--warning); }
    .skill__badge--wait { background: rgba(100,100,100,0.12); color: var(--text-muted); }
    .skill__body { margin-top: 1.25rem; }
    .skill__empty { font-size: 0.875rem; color: var(--text-muted); font-style: italic; margin-top: 0.5rem; }

    /* ===== Reusable Components ===== */

    /* Summary */
    .sum {
      background: linear-gradient(135deg, #121212 0%, #161616 100%);
      border: 1px solid var(--border-mid); border-left: 3px solid var(--accent);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem;
    }
    .sum__tag {
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.375rem;
    }
    .sum__text { font-size: 0.9375rem; color: var(--text-primary); line-height: 1.7; margin: 0; }

    /* Cards */
    .cd {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem; margin-bottom: 0.75rem;
    }
    .cd:hover { border-color: var(--border-mid); }
    .cd--red { border-left: 3px solid var(--accent); }
    .cd--green { border-left: 3px solid var(--success); }
    .cd--yellow { border-left: 3px solid var(--warning); }
    .cd--danger { border-left: 3px solid var(--danger); }
    .cd__title { font-size: 0.9375rem; font-weight: 600; color: #fff; margin-bottom: 0.375rem; }
    .cd__body { font-size: 0.875rem; color: #c8c5c3; line-height: 1.5; }
    .cd__meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.375rem; }

    /* Grid */
    .gr { display: grid; gap: 0.75rem; }
    .gr--2 { grid-template-columns: 1fr; }
    .gr--3 { grid-template-columns: 1fr; }
    .gr--4 { grid-template-columns: repeat(2, 1fr); }
    .gr--5 { grid-template-columns: repeat(2, 1fr); }
    @media (min-width: 640px) {
      .gr--2 { grid-template-columns: repeat(2, 1fr); }
      .gr--3 { grid-template-columns: repeat(3, 1fr); }
      .gr--4 { grid-template-columns: repeat(4, 1fr); }
      .gr--5 { grid-template-columns: repeat(5, 1fr); }
    }

    /* Metrics */
    .mt {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem; text-align: center;
    }
    .mt__val { font-size: 1.75rem; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 0.25rem; }
    .mt__val--red { color: var(--accent); }
    .mt__val--green { color: var(--success); }
    .mt__val--yellow { color: var(--warning); }
    .mt__lbl { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
    .mt__sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* Tables */
    .tw { overflow-x: auto; margin-bottom: 1rem; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    thead { background: var(--bg-elevated); }
    th {
      text-align: left; padding: 0.625rem 0.875rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; font-size: 0.625rem;
      letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
    }
    td { padding: 0.625rem 0.875rem; border-bottom: 1px solid var(--border); color: #c8c5c3; vertical-align: top; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody tr:last-child td { border-bottom: none; }

    /* Tags */
    .tg {
      display: inline-block; font-size: 0.625rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      padding: 0.15em 0.5em; border-radius: 3px; white-space: nowrap;
    }
    .tg--red { background: var(--accent-dim); color: var(--accent); }
    .tg--green { background: var(--success-dim); color: var(--success); }
    .tg--yellow { background: var(--warning-dim); color: var(--warning); }
    .tg--gray { background: rgba(100,100,100,0.12); color: var(--text-muted); }
    .tg--danger { background: var(--danger-dim); color: var(--danger); }

    /* Progress Bar */
    .pb { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 0.375rem; }
    .pb__fill { height: 100%; border-radius: 3px; }
    .pb__fill--red { background: var(--accent); }
    .pb__fill--green { background: var(--success); }
    .pb__fill--yellow { background: var(--warning); }

    /* Callout */
    .co {
      background: var(--bg-surface); border-left: 3px solid var(--accent);
      padding: 0.875rem 1rem; margin-bottom: 1rem; border-radius: 0 6px 6px 0;
    }
    .co p { margin: 0; font-size: 0.875rem; font-style: italic; color: #b0adab; }

    /* Chat */
    .chat { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .chat__msg { max-width: 85%; padding: 0.625rem 0.875rem; border-radius: 10px; font-size: 0.875rem; line-height: 1.5; }
    .chat__msg--lead { align-self: flex-start; background: var(--bg-hover); color: #c8c5c3; border-bottom-left-radius: 3px; }
    .chat__msg--sdr { align-self: flex-end; background: #1a1a2e; color: var(--text-primary); border-bottom-right-radius: 3px; border: 1px solid #2a2a4a; }
    .chat__who { font-size: 0.625rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.125rem; }
    .chat__who--lead { color: var(--text-muted); }
    .chat__who--sdr { color: var(--accent); }

    /* Color Swatch */
    .sw { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .sw__color { width: 48px; height: 48px; border-radius: 6px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.08); }
    .sw__info { flex: 1; }
    .sw__name { font-size: 0.8125rem; font-weight: 600; color: #fff; }
    .sw__hex { font-size: 0.75rem; color: var(--text-secondary); font-family: monospace; }
    .sw__role { font-size: 0.6875rem; color: var(--text-muted); text-transform: capitalize; }

    /* Checklist */
    .cl { list-style: none; padding: 0; margin-bottom: 1rem; }
    .cl li { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.375rem 0; font-size: 0.875rem; color: #c8c5c3; }
    .cl__icon { flex-shrink: 0; margin-top: 0.125rem; }
    .cl__icon--done { color: var(--success); }
    .cl__icon--pending { color: var(--text-muted); }
    .cl__icon--blocked { color: var(--danger); }

    /* Section helper */
    .sc { margin-bottom: 1.5rem; }
    .sc:last-child { margin-bottom: 0; }

    /* Pillar bar */
    .pillar { margin-bottom: 0.875rem; }
    .pillar__row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
    .pillar__name { font-size: 0.875rem; font-weight: 600; color: #fff; }
    .pillar__score { font-size: 0.875rem; font-weight: 700; }

    /* SWOT Grid */
    .swot { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
    @media (max-width: 639px) { .swot { grid-template-columns: 1fr; } }
    .swot__quad { border-radius: var(--radius); padding: 1rem; }
    .swot__quad--s { background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.15); }
    .swot__quad--w { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15); }
    .swot__quad--o { background: rgba(59,130,246,0.06); border: 1px solid rgba(59,130,246,0.15); }
    .swot__quad--t { background: rgba(234,179,8,0.06); border: 1px solid rgba(234,179,8,0.15); }
    .swot__title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
    .swot__quad--s .swot__title { color: var(--success); }
    .swot__quad--w .swot__title { color: var(--danger); }
    .swot__quad--o .swot__title { color: #3b82f6; }
    .swot__quad--t .swot__title { color: var(--warning); }
    .swot__item { margin-bottom: 0.625rem; }
    .swot__item-title { font-size: 0.8125rem; font-weight: 600; color: #fff; }
    .swot__item-desc { font-size: 0.8125rem; color: #aaa; }

    /* Persona */
    .persona {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem;
      text-align: center;
    }
    .persona__name { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .persona__story { font-size: 0.875rem; color: #c8c5c3; margin-bottom: 1rem; line-height: 1.6; }
    .persona__quote {
      font-family: var(--font-display); font-style: italic; font-size: 1.125rem;
      color: var(--text-secondary); padding: 0 1rem;
    }
    .persona__quote::before { content: '\201C'; color: var(--accent); font-size: 1.5rem; }

    /* Footer */
    .footer {
      max-width: 1000px; margin: 4rem auto 0; padding: 2rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.5rem;
      align-items: center; text-align: center;
    }
    @media (min-width: 768px) { .footer { flex-direction: row; justify-content: space-between; text-align: left; } }
    .footer__brand { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; }
    .footer__brand span { color: var(--accent); }
    .footer__info { font-size: 0.6875rem; color: var(--text-faint); }

    /* ===== Animations ===== */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.5s ease both; }

    /* ===== Print ===== */
    @media print {
      body { background: #fff; color: #111; }
      .grain, .timeline { display: none; }
      .hero { border-bottom-color: #ddd; }
      .hero::before { display: none; }
      .hero__client { color: #111; }
      .week { border-color: #ddd; break-inside: avoid; }
      .week__body { max-height: none !important; }
      .cd, .mt, .sum { background: #f9f9f9; border-color: #ddd; break-inside: avoid; }
      .sum { border-left-color: var(--accent); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .tg { border: 1px solid currentColor; }
      .sw__color { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <header class="hero">
    <div class="hero__badge">V4</div>
    <h1 class="hero__client" id="heroClient">Portal de Entregas</h1>
    <p class="hero__subtitle">Estruturação Estratégica com IA</p>
    <div class="hero__progress">
      <div class="hero__bar"><div class="hero__fill" id="heroFill"></div></div>
      <span class="hero__label" id="heroLabel">Carregando...</span>
    </div>
  </header>

  <nav class="timeline" id="timeline"></nav>
  <main class="weeks" id="weeks"></main>

  <footer class="footer">
    <div class="footer__brand">Gerado por <span>V4 Estruturação IA</span></div>
    <div class="footer__info" id="footerInfo">Documento confidencial</div>
  </footer>

<script>
/* ==========================================================================
   Portal Engine — Data, Config, Helpers, Renderers
   ========================================================================== */

// Data injection point — render_portal.sh replaces this line
const PORTAL_DATA = /*%%DATA%%*/ {};

// ===== WEEK CONFIG =====
const WEEKS = [
  { n:1, title:'Diagnóstico', desc:'Análise completa da situação atual', skills:[
    {id:'ee-s1-diagnostico-maturidade', name:'Diagnóstico de Maturidade Digital'},
    {id:'ee-s1-swot', name:'Análise SWOT'},
    {id:'ee-s1-persona-icp', name:'Persona & ICP'},
    {id:'ee-s1-auditoria-comunicacao', name:'Auditoria de Comunicação'},
  ]},
  { n:2, title:'Pesquisa e Posicionamento', desc:'Entendimento do mercado e definição estratégica', skills:[
    {id:'ee-s2-pesquisa-mercado', name:'Pesquisa de Mercado'},
    {id:'ee-s2-posicionamento', name:'Posicionamento Estratégico'},

// ===== HELPERS =====
const E = s => s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const N = n => n != null ? new Intl.NumberFormat('pt-BR').format(n) : '—';
const BRL = n => n != null ? 'R$ ' + new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n) : '—';
const PCT = n => n != null ? n.toFixed(1).replace('.',',') + '%' : '—';

const CLS = {critical:'Crítico',low:'Baixo',medium:'Médio',good:'Bom',excellent:'Excelente'};
const CLC = {critical:'red',low:'danger',medium:'yellow',good:'green',excellent:'green'};
const IMP = {high:'Alto',medium:'Médio',low:'Baixo'};
const IMC = {high:'red',medium:'yellow',low:'green'};
const PRI = {high:'red',medium:'yellow',normal:'gray',P1:'red',P2:'yellow',P3:'gray'};

function tg(text, color) { return '<span class="tg tg--'+(color||'gray')+'">'+E(text)+'</span>'; }
function mt(val, label, color) { return '<div class="mt"><div class="mt__val'+(color?' mt__val--'+color:'')+'">'+(typeof val==='number'?N(val):E(String(val)))+'</div><div class="mt__lbl">'+E(label)+'</div></div>'; }
function sm(text) { return '<div class="sum"><div class="sum__tag">Resumo</div><p class="sum__text">'+E(text)+'</p></div>'; }
function co(text) { return '<div class="co"><p>'+E(text)+'</p></div>'; }
function pb(val, color) { return '<div class="pb"><div class="pb__fill pb__fill--'+(color||'red')+'" style="width:'+Math.min(100,Math.max(0,val||0))+'%"></div></div>'; }

function cd(title, body, variant) {
  return '<div class="cd'+(variant?' cd--'+variant:'')+'">'
    +(title?'<div class="cd__title">'+E(title)+'</div>':'')
    +(body?'<div class="cd__body">'+body+'</div>':'')
    +'</div>';
}

function tb(heads, rows) {
  if (!rows || !rows.length) return '';
  return '<div class="tw"><table><thead><tr>'+heads.map(h=>'<th>'+E(h)+'</th>').join('')+'</tr></thead><tbody>'
    +rows.map(r=>'<tr>'+r.map(c=>'<td>'+(c!=null?String(c):'')+' </td>').join('')+'</tr>').join('')
    +'</tbody></table></div>';
}

function chatBubbles(msgs) {
  return '<div class="chat">'+msgs.map(m=>{
    const who = m.from||'sdr';
    return '<div class="chat__msg chat__msg--'+who+'"><div class="chat__who chat__who--'+who+'">'
      +E(m.name||who)+'</div>'+E(m.text)+'</div>';
  }).join('')+'</div>';
}

function checklist(items, statusKey) {
  return '<ul class="cl">'+items.map(it=>{
    const st = statusKey ? (it[statusKey]||'pending') : 'pending';
    const icons = {done:'&#10003;', pending:'&#9675;', blocked:'&#10007;', pass:'&#10003;', fail:'&#10007;', partial:'&#9679;'};
    const cls = {done:'done',pending:'pending',blocked:'blocked',pass:'done',fail:'blocked',partial:'pending'};
    return '<li><span class="cl__icon cl__icon--'+(cls[st]||'pending')+'">'+(icons[st]||'&#9675;')+'</span><span>'
      +(typeof it==='string'?E(it):E(it.item||it.test||it.action||''))+'</span></li>';
  }).join('')+'</ul>';
}

function sc(title, html) { return '<div class="sc"><h3>'+E(title)+'</h3>'+html+'</div>'; }

  }
  if (d.issues_found?.length) {
    h += sc('Problemas Encontrados', '<ul class="cl">'+d.issues_found.map(i=>'<li><span class="cl__icon cl__icon--blocked">&#10007;</span><span>'+E(i)+'</span></li>').join('')+'</ul>');
  }
  return h;
},

}; // end RENDERERS

// ===== ENGINE =====
function init() {
  const data = PORTAL_DATA;
  if (!data || !data.client) { document.getElementById('weeks').innerHTML = '<p style="text-align:center;padding:4rem;color:var(--text-muted)">Nenhum dado de portal encontrado.<br>Execute <code>render_portal.sh</code> para gerar.</p>'; return; }

  const client = data.client;
  const progress = data.progress || {};
  const outputs = data.outputs || {};
  const hasSales = client.modulo_vendas !== false;

  // Header
  document.title = 'Portal — ' + (client.name || 'Cliente') + ' | V4';
  document.getElementById('heroClient').textContent = client.name || 'Cliente';
  document.getElementById('footerInfo').textContent = 'Documento confidencial — ' + (client.name||'') + ' — ' + (client.created_at||new Date().toISOString().slice(0,10));

  // Calculate progress
  const activeWeeks = WEEKS.filter(w => !w.sales || hasSales);
  const allSkills = activeWeeks.flatMap(w => w.skills);
  const completed = allSkills.filter(s => progress.skills?.[s.id]?.status === 'completed').length;
  const total = allSkills.length;
  const pct = total > 0 ? Math.round(completed / total * 100) : 0;

  // Animate progress
  requestAnimationFrame(() => {
    document.getElementById('heroFill').style.width = pct + '%';
    document.getElementById('heroLabel').textContent = completed + '/' + total + ' entregas (' + pct + '%)';
  });

  // Timeline
  const nav = document.getElementById('timeline');
  activeWeeks.forEach(week => {
    const ws = week.skills;
    const done = ws.filter(s => progress.skills?.[s.id]?.status === 'completed').length;
    const wip = ws.filter(s => progress.skills?.[s.id]?.status === 'in_progress').length;
    const isCurrent = progress.current_week === week.n;
    const dotCls = done === ws.length ? 'tl-dot--done' : isCurrent ? 'tl-dot--current' : done > 0 || wip > 0 ? 'tl-dot--has-progress' : '';

    const btn = document.createElement('button');
    btn.className = 'tl-item' + (isCurrent ? ' tl-item--active' : '');
    btn.innerHTML = '<span class="tl-dot ' + dotCls + '"></span><span class="tl-label">Sem. ' + week.n + '</span>';
    btn.onclick = () => {
      const target = document.getElementById('week-' + week.n);
      if (target) { target.scrollIntoView({ behavior: 'smooth', block: 'start' }); toggleWeek(week.n, true); }
    };
    nav.appendChild(btn);
  });

  // Weeks
  const main = document.getElementById('weeks');
  activeWeeks.forEach((week, wi) => {
    const ws = week.skills;
    const done = ws.filter(s => progress.skills?.[s.id]?.status === 'completed').length;
    const isCurrent = progress.current_week === week.n;
    const isOpen = isCurrent || (done > 0 && done < ws.length);

    const section = document.createElement('section');
    section.className = 'week' + (isCurrent ? ' week--current' : '');
    section.id = 'week-' + week.n;
    section.style.animationDelay = (wi * 0.08) + 's';
    section.classList.add('fade-in');

    const pctW = ws.length > 0 ? Math.round(done / ws.length * 100) : 0;

    section.innerHTML =
      '<button class="week__header" onclick="toggleWeek(' + week.n + ')">'
      + '<span class="week__ghost">' + week.n + '</span>'
      + '<div class="week__info">'
      +   '<div class="week__tag">Semana ' + week.n + '</div>'
      +   '<div class="week__title">' + E(week.title) + '</div>'
      +   '<div class="week__desc">' + E(week.desc) + '</div>'
      + '</div>'
      + '<div class="week__meta">'
      +   '<span class="week__count">' + done + '/' + ws.length + '</span>'
      +   '<div class="week__minibar"><div class="week__minibar-fill" style="width:' + pctW + '%"></div></div>'
      + '</div>'
      + '<span class="week__chev' + (isOpen ? ' week__chev--open' : '') + '" id="chev-' + week.n + '">&#9660;</span>'
      + '</button>'
      + '<div class="week__body" id="body-' + week.n + '">'
      + '<div class="week__content">'
      + ws.map(skill => renderSkill(skill, progress, outputs)).join('')
      + '</div></div>';

    main.appendChild(section);

    // Open if current
    if (isOpen) {
      requestAnimationFrame(() => {
        const body = document.getElementById('body-' + week.n);
        if (body) body.style.maxHeight = body.scrollHeight + 'px';
      });
    }
  });
}

function renderSkill(skill, progress, outputs) {
  const st = progress.skills?.[skill.id]?.status || 'pending';
  const data = outputs[skill.id];

  const dots = { completed: 'done', in_progress: 'wip', pending: 'wait' };
  const badges = { completed: ['done','Concluído'], in_progress: ['wip','Em andamento'], pending: ['wait','Pendente'] };
  const [bc, bl] = badges[st] || badges.pending;

  let content = '';
  if (st === 'completed' && data && R[skill.id]) {
    try { content = '<div class="skill__body">' + R[skill.id](data) + '</div>'; }
    catch(e) { content = '<div class="skill__body"><p style="color:var(--danger)">Erro ao renderizar: ' + E(e.message) + '</p></div>'; }
  } else if (st === 'in_progress') {
    content = '<div class="skill__empty">Entrega em desenvolvimento...</div>';
  }

  return '<div class="skill skill--' + st + '">'
    + '<div class="skill__head">'
    +   '<span class="skill__dot skill__dot--' + (dots[st]||'wait') + '"></span>'
    +   '<span class="skill__name">' + E(skill.name) + '</span>'
    +   '<span class="skill__badge skill__badge--' + bc + '">' + E(bl) + '</span>'
    + '</div>'
    + content
    + '</div>';
}

function toggleWeek(n, forceOpen) {
  const body = document.getElementById('body-' + n);
  const chev = document.getElementById('chev-' + n);
  if (!body) return;

  if (body.style.maxHeight && !forceOpen) {
    body.style.maxHeight = null;
    if (chev) chev.classList.remove('week__chev--open');
  } else {
    body.style.maxHeight = body.scrollHeight + 'px';
    if (chev) chev.classList.add('week__chev--open');
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
