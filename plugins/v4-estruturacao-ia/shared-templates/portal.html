'ee-s2-diagnostico-midia'(d) {
  // Helper: trend arrow + % change between two values
  function trend(curr, prev, invertBad) {
    if (!prev || prev === 0) return '';
    const pct = ((curr - prev) / Math.abs(prev) * 100);
    const up = pct >= 0;
    // For CPA/CPL, going up is bad; for clicks/leads, going up is good
    const isGood = invertBad ? !up : up;
    const col = isGood ? 'var(--success)' : 'var(--danger)';
    const arrow = up ? '▲' : '▼';
    return ' <span style="color:'+col+';font-size:.6875rem;font-weight:700">'+arrow+Math.abs(pct).toFixed(0)+'%</span>';
  }

  // Helper: monthly evolution table
  function evTable(rows, cols) {
    if (!rows?.length) return '';
    const headers = ['Mês'].concat(cols.map(c=>c.label));
    const trows = rows.map((r, i) => {
      const prev = rows[i-1];
      return [E(r.month)].concat(cols.map(c => {
        const val = r[c.key];
        const prevVal = prev ? prev[c.key] : null;
        let formatted = val==null ? '—' : (c.fmt ? c.fmt(val) : String(val));
        let tr = prevVal!=null ? trend(val, prevVal, c.badUp||false) : '';
        let cls = c.colorFn ? c.colorFn(val, prev ? prev[c.key] : null) : '';
        return (cls ? tg(formatted, cls) : formatted) + tr;
      }));
    });
    return tb(headers, trows);
  }

  let h = '';

  // Period header
  if (d.data_period) {
    h += '<div style="display:inline-flex;align-items:center;gap:.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.375rem .75rem;margin-bottom:.75rem">'
      +'<span style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Período analisado</span>'
      +'<span style="font-size:.8125rem;font-weight:700;color:var(--accent)">'+E(d.data_period)+'</span>'
      +(d.data_period_months ? '<span style="font-size:.75rem;color:var(--text-muted)">('+d.data_period_months+' meses)</span>' : '')
      +'</div>';
  }

  if (d.summary) h += sm(d.summary);

  // Overview metrics
  const om = d.overall_metrics||{};
  if (om.cac || om.cpl_real) {
    h += '<div class="gr gr--4">'
      +mt(om.cpl_real!=null?BRL(om.cpl_real):'—','CPL Real','red')
      +mt(om.leads_month!=null?N(om.leads_month):'—','Leads/mês','')
      +mt(om.agendamentos_month!=null?N(om.agendamentos_month):'—','Agendamentos/mês','')
      +mt(om.cac!=null?BRL(om.cac):'—','CAC Total','red')
      +'</div>';
  }

  // CPL Gauge vs Benchmark
  const bench = d.benchmarks || {};
  if (om.cpl_real!=null && bench.cpl!=null) {
    const cplMax = Math.max(om.cpl_real, bench.cpl) * 1.5;
    const gap = ((om.cpl_real - bench.cpl) / bench.cpl * 100);
    const cplTone = om.cpl_real <= bench.cpl ? 'good' : om.cpl_real <= bench.cpl*1.3 ? 'warn' : 'bad';
    const cplInsight = gap > 0
      ? 'CPL atual ('+BRL(om.cpl_real)+') está '+gap.toFixed(0)+'% acima do benchmark ('+BRL(bench.cpl)+') — cada lead custa '+BRL(om.cpl_real - bench.cpl)+' a mais do que deveria.'
      : 'CPL ('+BRL(om.cpl_real)+') está '+Math.abs(gap).toFixed(0)+'% abaixo do benchmark — aproveitar para escalar budget.';
    h += sc('CPL vs Benchmark do Setor',
      insight(chartGauge(om.cpl_real, bench.cpl, cplMax, {title:'CPL Real vs Benchmark', fmt:v=>BRL(v), invert:true}),
        cplInsight, cplTone));
  }

  // ── GOOGLE ADS ──
  const ga = d.google_ads;
  if (ga) {
    // Divisor forte antes da seção Google Ads
    h += '<div style="margin:2rem 0 1rem;padding:1rem 1.25rem;background:linear-gradient(90deg, rgba(59,130,246,0.08), transparent);border-left:4px solid #3b82f6;border-radius:4px">'
      +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#3b82f6;margin-bottom:.125rem">Canal 1</div>'
      +'<div style="font-size:1.25rem;font-weight:800;color:var(--text-primary);letter-spacing:-.01em">Google Ads</div>'
      +(ga.budget_monthly?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.125rem">Investimento atual: '+BRL(ga.budget_monthly)+'/mês · '+(ga.active_campaigns||0)+' campanha'+(ga.active_campaigns!==1?'s':'')+' ativa'+(ga.active_campaigns!==1?'s':'')+' de '+(ga.total_campaigns||0)+' total</div>':'')
      +'</div>';
    const gClsColor = ga.score >= 70?'success':ga.score>=40?'warning':'danger';
    let gaHead = '';

    // Monthly evolution table
    let gaEvol = '';
    if (ga.monthly_evolution?.length) {
      gaEvol = evTable(ga.monthly_evolution, [
        {key:'cost',   label:'Custo',        fmt: v=>'R$'+v.toFixed(0), badUp:true,  colorFn:(v,p)=>p&&v>p*1.1?'red':p&&v<p*0.9?'green':''},
        {key:'clicks', label:'Clicks',       fmt: v=>N(v),              badUp:false, colorFn:(v,p)=>p&&v<p*0.9?'red':p&&v>p*1.1?'green':''},
        {key:'impressions',label:'Impressões',fmt:v=>N(v),              badUp:false, colorFn:(v,p)=>p&&v<p*0.9?'red':''},
        {key:'ctr',    label:'CTR',          fmt: v=>v.toFixed(2)+'%',  badUp:false},
        {key:'cpa',    label:'CPA',          fmt: v=>'R$'+v.toFixed(2), badUp:true,  colorFn:(v,p)=>v>30?'red':v>15?'yellow':'green'},
        {key:'conversions',label:'Conv.',    fmt: v=>N(v),              badUp:false},
      ]);
    }

    // Gender breakdown bars
    let gaGender = '';
    if (ga.gender_breakdown?.length) {
      const maxPct = Math.max(...ga.gender_breakdown.map(g=>g.pct_clicks));
      gaGender = '<div style="margin-bottom:.25rem;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Distribuição por Gênero</div>';
      ga.gender_breakdown.forEach(g => {
        const barW = (g.pct_clicks/maxPct*100).toFixed(1);
        const col = g.gender==='Feminino'?'var(--danger)':g.gender==='Masculino'?'#3b82f6':'var(--border-strong)';
        gaGender += '<div style="display:grid;grid-template-columns:90px 1fr 60px 70px;gap:.375rem;align-items:center;margin-bottom:.375rem">'
          +'<div style="font-size:.75rem;color:var(--text-secondary)">'+E(g.gender)+'</div>'
          +'<div style="height:16px;background:var(--surface);border-radius:3px;overflow:hidden">'
          +  '<div style="height:100%;width:'+barW+'%;background:'+col+';border-radius:3px;opacity:.8"></div>'
          +'</div>'
          +'<div style="font-size:.75rem;font-weight:700;color:var(--text-primary)">'+g.pct_clicks.toFixed(1)+'%</div>'
          +'<div style="font-size:.6875rem;color:var(--text-muted)">CPA R$'+g.cpa.toFixed(2)+'</div>'
          +'</div>';
      });
    }

    // Day of week bars
    let gaDow = '';
    if (ga.day_of_week?.length) {
      const maxPct = Math.max(...ga.day_of_week.map(dw=>dw.pct));
      gaDow = '<div style="margin-bottom:.25rem;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Volume por Dia da Semana</div>';
      ga.day_of_week.forEach(dw => {
        const barW = (dw.pct/maxPct*100).toFixed(1);
        const isBest = dw.ctr === Math.max(...ga.day_of_week.map(x=>x.ctr));
        const isTop = dw.pct >= 15.0;
        const col = isBest ? 'var(--warning)' : isTop ? 'var(--danger)' : 'var(--accent)';
        gaDow += '<div style="display:grid;grid-template-columns:70px 1fr 48px 60px;gap:.375rem;align-items:center;margin-bottom:.3rem">'

          +'<div style="height:14px;background:var(--surface);border-radius:2px;overflow:hidden">'
          +  '<div style="height:100%;width:'+barW+'%;background:'+col+';border-radius:2px;opacity:.75"></div>'

          +'<div style="font-size:.75rem;font-weight:700;color:var(--text-primary)">'+dw.pct.toFixed(1)+'%</div>'
          +'<div style="font-size:.6875rem;color:var(--text-muted)">CTR '+dw.ctr.toFixed(2)+'%</div>'
          +'</div>';
      });
    }

    // Keywords table — rich version
    let gaKw = '';
    if (ga.top_keywords?.length) {
      gaKw = tb(
        ['Keyword','Tipo','Impr.','Clicks','CTR','Custo','CPC','CPA','Conv.',''],
        ga.top_keywords.map(k=>[
          '<span style="font-weight:600;font-size:.8125rem">'+E(k.keyword)+'</span>'
            +(k.insight&&k.insight.startsWith('🔥')||k.insight&&k.insight.startsWith('🐱')

          tg('R$'+c.cpa.toFixed(2),'green'),
          N(c.conversions),
          '<span style="font-size:.75rem;color:var(--text-muted)">'+E(c.note)+'</span>'
        ]));
    }

    h += sc('Google Ads', gaHead
      +(gaEvol ? '<div style="margin-bottom:.75rem"><div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Evolução Mensal</div>'+gaEvol+'</div>' : '')
      +'<div class="gr gr--2">'

      +(gaKw ? '<div style="margin-top:.75rem"><div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Análise de Keywords</div>'+gaKw+'</div>' : '')
      +(gaMissed ? cd('Keywords Ausentes — Gap Crítico', gaMissed, 'danger') : '')
      +(gaPaused ? '<div style="margin-top:.75rem"><div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Campanhas Pausadas com Alta Performance</div>'+gaPaused+'</div>' : '')
    );

  // ── META ADS ──
  const ma = d.meta_ads;
  if (ma) {
    // Divisor forte antes da seção Meta Ads
    h += '<div style="margin:2.5rem 0 1rem;padding:1rem 1.25rem;background:linear-gradient(90deg, rgba(59,130,246,0.08), transparent);border-left:4px solid #1877f2;border-radius:4px">'
      +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#1877f2;margin-bottom:.125rem">Canal 2</div>'
      +'<div style="font-size:1.25rem;font-weight:800;color:var(--text-primary);letter-spacing:-.01em">Meta Ads (Facebook + Instagram)</div>'
      +(ma.budget_monthly?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.125rem">Investimento atual: '+BRL(ma.budget_monthly)+'/mês · '+(ma.active_campaigns||0)+' campanha'+(ma.active_campaigns!==1?'s':'')+' ativa'+(ma.active_campaigns!==1?'s':'')+' de '+(ma.total_campaigns||0)+' total'+(ma.status==='broken'?' · ⚠ links quebrados detectados':'')+'</div>':'')
      +'</div>';
    const mClsColor = ma.score >= 40?'warning':'danger';
    let maHead = '';

    // Monthly evolution table for Meta
    let maEvol = '';
    if (ma.monthly_evolution?.length) {
      maEvol = evTable(ma.monthly_evolution, [
        {key:'spend',      label:'Gasto',       fmt: v=>'R$'+v.toFixed(0), badUp:true},
        {key:'impressions',label:'Impressões',   fmt: v=>N(v),              badUp:false},

        {key:'ctr',        label:'CTR',          fmt: v=>v.toFixed(2)+'%',  badUp:false, colorFn:(v)=>v<1?'red':v<2?'yellow':'green'},
      ]);

    let maCritical = '';
    if (ma.critical_issues?.length) {

    }

    h += sc('Meta Ads', maHead
      +(maEvol ? '<div style="margin-bottom:.75rem"><div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Evolução Mensal</div>'+maEvol+'</div>' : '')
      +cd('Problemas Críticos', maCritical, 'danger')
      +(maBench ? '<div style="margin-top:.75rem">'+maBench+'</div>' : '')
      +(maBest ? cd('Histórico de Destaque', maBest) : '')
    );
  }

  // Top problems
  if (d.top_problems?.length) {
    h += sc('Top 3 Problemas Críticos', d.top_problems.map(p=>
      cd(p.problem,
        '<p style="margin:0 0 .375rem"><strong>Evidência:</strong> '+E(p.data_evidence)+'</p>'
        +'<p style="margin:0;color:var(--text-secondary)">'+E(p.impact)+'</p>',
        'danger')
    ).join(''));
  }

  // Action plan
  if (d.action_plan?.length) {
    h += sc('Plano de Ação — 30 dias', tb(['#','Ação','Prioridade','Impacto','Prazo'],
      d.action_plan.map(a=>[
        E(a.rank),
        E(a.action),
        tg(a.priority, {P1:'red',P2:'yellow',P3:'gray'}[a.priority]||'gray'),
        '<span style="font-size:.75rem;color:var(--text-muted)">'+E(a.expected_impact)+'</span>',
        E(a.deadline)
      ])));
  }

  // Keyword clusters
  if (d.keyword_clusters?.length) {
    // Donut de distribuição de budget
    const withBudget = d.keyword_clusters.filter(c=>c.budget_allocation_pct!=null);
    let donutBlock = '';
    if (withBudget.length >= 2) {
      const donutData = withBudget.map((c,i)=>({
        label: c.cluster,
        value: c.budget_allocation_pct,
        tone: ['blue','green','yellow','red','gray','blue'][i%6],
      }));
      const top = [...withBudget].sort((a,b)=>(b.budget_allocation_pct||0)-(a.budget_allocation_pct||0))[0];
      const donutInsight = top
        ? 'Cluster "'+top.cluster+'" concentra '+top.budget_allocation_pct+'% do budget — intent '+(top.intent||'?')+'. '
          +(top.budget_allocation_pct>=40?'Concentração alta: revisar diversificação.':'Mix equilibrado entre intents.')
        : '';
      donutBlock = insight(chartDonut(donutData, {title:'Distribuição de Budget por Cluster'}),
        donutInsight, top?.budget_allocation_pct>=50?'warn':'good');
    }
    h += sc('Clusters de Keywords', donutBlock + tb(
      ['Cluster','Intenção','% Budget','CPC esperado','Bid strategy','Ângulo de copy','Risco'],
      d.keyword_clusters.map(c=>[
        '<strong>'+E(c.cluster)+'</strong>'
          +(c.keywords?.length?'<div style="font-size:.6875rem;color:var(--text-muted);margin-top:.125rem">'+(c.keywords||[]).slice(0,6).map(E).join(' · ')+'</div>':''),
        c.intent?tg(c.intent,{transactional:'green',commercial:'yellow',informational:'gray',navigational:'green'}[c.intent]):'—',
        c.budget_allocation_pct!=null?tg(c.budget_allocation_pct+'%',c.budget_allocation_pct>=30?'red':c.budget_allocation_pct>=15?'yellow':'gray'):'—',
        E(c.expected_cpc_range||'—'),
        '<span style="font-size:.75rem">'+E(c.bid_strategy||'—')+'</span>',
        '<span style="font-size:.75rem;color:var(--text-muted)">'+E(c.copy_angle||'—')+'</span>',
        '<span style="font-size:.75rem;color:var(--danger)">'+E(c.risk||'—')+'</span>',
      ])));
  }

  // Budget reallocation scenarios
  if (d.budget_reallocation_scenarios) {
    const br = d.budget_reallocation_scenarios;
    const sumAlloc = obj => obj ? Object.values(obj).reduce((s,v)=>s+(typeof v==='number'?v:0),0) : 0;
    const scenTotal = s => (s.total_budget_monthly!=null)?s.total_budget_monthly:(sumAlloc(s.google_allocation)+sumAlloc(s.meta_allocation));
    const scenLeads = s => s.expected_leads_monthly ?? s.projected_leads_month ?? null;
    const scenCpl = s => s.expected_cpl ?? s.projected_cpl ?? null;
    const scenName = s => s.name || s.label || '—';
    const scenGoogle = s => s.google_split!=null?s.google_split:sumAlloc(s.google_allocation);
    const scenMeta = s => s.meta_split!=null?s.meta_split:sumAlloc(s.meta_allocation);

    const renderBs = (s, variant) => s ? cd(scenName(s),
      '<div class="gr gr--2" style="gap:.375rem">'
      +mt(BRL(scenTotal(s)),'Budget/mês','')
      +(scenLeads(s)!=null?mt(N(scenLeads(s)),'Leads/mês',''):'')
      +(scenCpl(s)!=null?mt(BRL(scenCpl(s)),'CPL projetado',''):'')
      +(s.expected_roas!=null?mt(s.expected_roas.toFixed(1)+'x','ROAS',''):
        s.delta_leads?mt(s.delta_leads,'Δ Leads',''):'')
      +'</div>'
      +'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">'
      +(scenGoogle(s)>0?'Google: '+BRL(scenGoogle(s))+' · ':'')
      +(scenMeta(s)>0?'Meta: '+BRL(scenMeta(s)):'')
      +'</div>'
      +(s.effort_weeks!=null||s.confidence?('<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">'
        +(s.effort_weeks!=null?'Esforço: '+s.effort_weeks+' sem · ':'')
        +(s.confidence?'Confiança: '+E(s.confidence):'')
        +'</div>'):'')
      +(s.changes?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Mudanças ('+s.changes.length+')</summary>'
        +'<ul style="font-size:.75rem;margin:.375rem 0 0;padding-left:1rem">'+s.changes.map(c=>'<li style="margin-bottom:.2rem">'+E(c)+'</li>').join('')+'</ul></details>':'')
      +(s.campaigns_structure?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Estrutura ('+s.campaigns_structure.length+' campanhas)</summary>'
        +'<div style="font-size:.75rem;margin-top:.375rem">'+s.campaigns_structure.map(c=>
          '<div style="margin-bottom:.25rem">• <strong>'+E(c.campaign)+'</strong> ('+E(c.platform||'')+') — '+(c.budget_monthly!=null?BRL(c.budget_monthly):'—')+' — <em>'+E(c.objective||'')+'</em></div>'
        ).join('')+'</div></details>':'')
      +(s.prerequisites?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Pré-requisitos ('+s.prerequisites.length+')</summary>'
        +'<ul style="font-size:.75rem;margin:.375rem 0 0;padding-left:1rem">'+s.prerequisites.map(c=>'<li>'+E(c)+'</li>').join('')+'</ul></details>':'')
      +(s.risk_assessment?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">Risco: '+E(s.risk_assessment)+'</div>':''),
      variant) : '';
    // Scenario comparison — metrics as rows, scenarios as columns, inline bars per row
    const scArr = [br.scenario_a_conservative, br.scenario_b_realistic, br.scenario_c_aggressive].filter(Boolean);
    let scChart = '';
    if (scArr.length >= 2) {
      const recommendedIdx = 1; // realista
      const best = scArr.reduce((b,x)=>((scenLeads(x)||0)>(scenLeads(b)||0)?x:b), scArr[0]);
      const scInsightTxt = best
        ? 'Cenário "'+scenName(best).split('—')[0].trim()+'" entrega '+N(scenLeads(best)||0)+' leads/mês a CPL '+BRL(scenCpl(best)||0)+' com budget de '+BRL(scenTotal(best))+'.'
        : '';
      const shortName = s => scenName(s).split('—')[0].trim();
      // Column header
      const colHeader = '<div style="display:grid;grid-template-columns:minmax(140px,20%) repeat('+scArr.length+',1fr);gap:.75rem;align-items:end;padding:0 0 .75rem;border-bottom:2px solid var(--border)">'
        +'<div></div>'
        +scArr.map((s,i)=>{
          const isRec = i===recommendedIdx;
          return '<div style="text-align:center">'
            +(isRec?'<div style="font-size:.6875rem;font-weight:700;color:'+chartColor('green')+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem">★ Recomendado</div>':'<div style="height:1rem"></div>')
            +'<div style="font-size:.875rem;font-weight:700;color:'+(isRec?chartColor('green'):'var(--text)')+'">'+E(shortName(s))+'</div>'
            +'<div style="font-size:.6875rem;color:var(--text-muted);margin-top:.15rem;line-height:1.3">'+E(scenName(s).split('—').slice(1).join('—').trim()||'')+'</div>'
            +'</div>';
        }).join('')+'</div>';
      // Metric rows with inline bars (normalized per row)
      const rows = [
        {label:'Budget/mês', invert:false, values:scArr.map(s=>scenTotal(s)), fmt:v=>BRL(v)},
        {label:'Leads projetados/mês', invert:false, values:scArr.map(s=>scenLeads(s)), fmt:v=>N(v)+' leads'},
        {label:'CPL projetado', invert:true, values:scArr.map(s=>scenCpl(s)), fmt:v=>BRL(v), note:'menor = melhor'},
        {label:'Δ vs atual', invert:false, values:scArr.map(s=>s.delta_leads||null), fmt:v=>v, isText:true},
        {label:'Esforço', invert:true, values:scArr.map(s=>s.effort_weeks), fmt:v=>v+' sem', note:'menor = melhor'},
        {label:'Confiança', invert:false, values:scArr.map(s=>s.confidence||null), fmt:v=>v, isText:true},
      ].filter(r=>r.values.some(v=>v!=null && v!==0));
      const rowsHtml = rows.map(r=>{
        const numVals = r.values.map(v=>typeof v==='number'?v:null);
        const maxV = Math.max(...numVals.filter(v=>v!=null));
        const minV = Math.min(...numVals.filter(v=>v!=null));
        const best = r.invert ? minV : maxV;
        return '<div style="display:grid;grid-template-columns:minmax(140px,20%) repeat('+scArr.length+',1fr);gap:.75rem;align-items:center;padding:.625rem 0;border-bottom:1px solid var(--border)">'
          +'<div><div style="font-size:.75rem;font-weight:600">'+E(r.label)+'</div>'
          +(r.note?'<div style="font-size:.625rem;color:var(--text-muted)">'+E(r.note)+'</div>':'')+'</div>'
          +r.values.map((v,i)=>{
            const isRec = i===recommendedIdx;
            if (v==null) return '<div style="text-align:center;font-size:.75rem;color:var(--text-muted)">—</div>';
            const isBest = typeof v==='number' && v===best && numVals.filter(x=>x===best).length<numVals.filter(x=>x!=null).length;
            const col = isBest?chartColor('green'):(isRec?chartColor('green'):'var(--text)');
            if (r.isText) {
              return '<div style="text-align:center"><div style="font-size:.8125rem;font-weight:'+(isRec?700:600)+';color:'+col+'">'+E(String(r.fmt(v)))+'</div></div>';
            }
            const pct = maxV>0 ? (v/maxV*100) : 0;
            return '<div style="text-align:center">'
              +'<div style="font-size:.8125rem;font-weight:'+(isRec||isBest?700:600)+';color:'+col+';margin-bottom:.2rem">'+E(String(r.fmt(v)))+(isBest?' <span style="font-size:.625rem">★</span>':'')+'</div>'
              +'<div style="height:6px;background:var(--surface);border-radius:2px;overflow:hidden">'
              +'<div style="height:100%;width:'+pct.toFixed(1)+'%;background:'+(isBest?chartColor('green'):isRec?chartColor('green'):CX.muted)+';opacity:'+(isBest||isRec?'.85':'.5')+';border-radius:2px"></div>'
              +'</div></div>';
          }).join('')
          +'</div>';
      }).join('');
      scChart = insight(
        chartTitle('Comparativo de Cenários — Trade-offs Lado a Lado')
        +colHeader+rowsHtml,
        scInsightTxt, 'good');
    }
    h += sc('Cenários de Realocação de Budget',
      (br.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .75rem">'+E(br.description)+'</p>':'')
      +scChart
      +'<div class="gr gr--3">'
      +renderBs(br.scenario_a_conservative,'gray')
      +renderBs(br.scenario_b_realistic,'green')
      +renderBs(br.scenario_c_aggressive,'yellow')
      +'</div>'
      +(br.recommendation?co(br.recommendation):''));
  }

  // Creative testing hypotheses
  if (d.creative_testing_hypotheses?.hypotheses?.length) {
    const ct = d.creative_testing_hypotheses;
    h += sc('Hipóteses de Teste de Criativos',
      ct.hypotheses.map(hy=>
        cd((hy.id?hy.id+' — ':'')+(hy.hypothesis||'—'),
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.75rem">'
          +(hy.angle?'<div><strong>Ângulo:</strong> '+E(hy.angle)+'</div>':'')
          +(hy.format?'<div><strong>Formato:</strong> '+E(hy.format)+'</div>':'')
          +(hy.target_audience?'<div><strong>Público:</strong> '+E(hy.target_audience)+'</div>':'')
          +(hy.cta?'<div><strong>CTA:</strong> '+E(hy.cta)+'</div>':'')
          +'</div>'
          +(hy.hook?'<div style="font-size:.8125rem;margin-top:.375rem"><strong>Hook:</strong> <em>"'+E(hy.hook)+'"</em></div>':'')
          +(hy.body?'<div style="font-size:.75rem;margin-top:.25rem;color:var(--text-secondary)">'+E(hy.body)+'</div>':'')
          +(hy.success_criteria?'<div style="font-size:.75rem;margin-top:.375rem;color:var(--success)"><strong>Sucesso:</strong> '+E(hy.success_criteria)+'</div>':'')
          +'<div style="margin-top:.375rem;display:flex;gap:.375rem">'
          +(hy.testing_budget!=null?tg(BRL(hy.testing_budget),'gray'):'')
          +(hy.testing_duration_days!=null?tg(hy.testing_duration_days+' dias','gray'):'')
          +'</div>',
          'yellow')
      ).join('')
      +(ct.testing_budget_total_week_1!=null?co('Budget total semana 1 de testes: '+BRL(ct.testing_budget_total_week_1)):''));
  }

  // Daypart optimization
  if (d.daypart_optimization?.adjustments?.length) {
    h += sc('Otimização por Dia/Hora',
      tb(['Janela','Ajuste de lance','Rationale'],
        d.daypart_optimization.adjustments.map(a=>[
          '<strong>'+E(a.day_time)+'</strong>',
          a.bid_adjustment_pct!=null?tg((a.bid_adjustment_pct>=0?'+':'')+a.bid_adjustment_pct+'%',a.bid_adjustment_pct>=0?'green':'red'):'—',
          '<span style="font-size:.75rem;color:var(--text-secondary)">'+E(a.rationale||'—')+'</span>',
        ])));
  }

  // Forecast sensitivity
  if (d.forecast_sensitivity_analysis) {
    const fs = d.forecast_sensitivity_analysis;
    const bcLeads = bc => bc.leads_monthly ?? bc.leads_month_90d ?? null;
    const bcCpl = bc => bc.cpl ?? bc.cpl_90d_brl ?? null;
    const bcCac = bc => bc.cac ?? bc.cac_90d_brl ?? null;
    let bcHtml = '';
    if (fs.base_case) {
      const bc = fs.base_case;
      bcHtml = (bc.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .5rem"><strong>Caso base:</strong> '+E(bc.description)+'</p>':'')
        +'<div class="gr gr--4">'
        +(bcLeads(bc)!=null?mt(N(bcLeads(bc)),'Leads/mês',''):'')
        +(bcCpl(bc)!=null?mt(BRL(bcCpl(bc)),'CPL',''):'')
        +(bcCac(bc)!=null?mt(BRL(bcCac(bc)),'CAC','green'):'')
        +(bc.revenue_monthly!=null?mt(BRL(bc.revenue_monthly),'Receita/mês','green'):'')
        +(bc.roas!=null?mt(bc.roas.toFixed(1)+'x','ROAS','green'):'')
        +'</div>';
    }
    let varHtml = '';
    let sensChart = '';
    if (fs.variations?.length) {
      // Support both new (delta_vs_base_pct) and old field shapes
      const parsePct = s => {
        if (s==null) return null;
        if (typeof s === 'number') return s;
        const m = String(s).match(/([+-]?\d+(?:\.\d+)?)\s*%/);
        return m ? parseFloat(m[1]) : null;
      };
      const getPct = v => (typeof v.delta_vs_base_pct === 'number' ? v.delta_vs_base_pct
        : parsePct(v.impact_on_leads) ?? parsePct(v.impact_on_revenue));
      const getName = v => v.scenario || v.scenario_name || '—';
      const getLeads = v => v.impact_on_leads_month_90d ?? v.impact_on_leads ?? null;
      const getCpl = v => v.impact_on_cpl_brl ?? v.impact_on_cpl ?? null;

      const baseLeads = fs.base_case ? bcLeads(fs.base_case) : null;
      const sorted = [...fs.variations].sort((a,b)=>(getPct(a)??0)-(getPct(b)??0));
      const maxAbs = Math.max(...sorted.map(v=>Math.abs(getPct(v)??0)), 1);
      if (sorted.length) {
        const worst = sorted[0];
        const worstPct = getPct(worst) ?? 0;
        const sensInsight = 'Cada linha é um cenário "e se" de risco aplicado sobre o caso base. Maior ameaça: "'
          +getName(worst).split('(')[0].trim()+'" derruba '+Math.abs(worstPct).toFixed(0)+'% dos leads. Monitore o gatilho e acione mitigação antes do impacto se materializar.';
        const header = '<div style="display:grid;grid-template-columns:minmax(180px,32%) minmax(90px,12%) 1fr minmax(70px,10%);gap:.75rem;align-items:end;padding:0 0 .5rem;border-bottom:1px solid var(--border);font-size:.6875rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600">'
          +'<div>Cenário de risco</div>'
          +'<div style="text-align:right">Leads/mês</div>'
          +'<div>Perda vs base'+(baseLeads!=null?' (base: '+N(baseLeads)+' leads)':'')+'</div>'
          +'<div style="text-align:right">Δ %</div></div>';
        const rows = sorted.map(v=>{
          const pct = getPct(v) ?? 0;
          const leads = getLeads(v);
          const col = pct<=-25?chartColor('red'):pct<=-10?chartColor('yellow'):chartColor('gray');
          const barPct = Math.min(100, (Math.abs(pct)/maxAbs*100));
          return '<div style="display:grid;grid-template-columns:minmax(180px,32%) minmax(90px,12%) 1fr minmax(70px,10%);gap:.75rem;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">'
            +'<div style="font-size:.75rem;font-weight:600;line-height:1.35">'+E(getName(v))+'</div>'
            +'<div style="text-align:right"><div style="font-size:.8125rem;font-weight:700;color:'+col+'">'+(leads!=null?N(leads):'—')+'</div>'
            +(leads!=null&&baseLeads!=null?'<div style="font-size:.625rem;color:var(--text-muted)">'+(leads-baseLeads>0?'+':'')+N(leads-baseLeads)+' vs base</div>':'')+'</div>'
            +'<div style="position:relative;height:14px;background:var(--surface);border-radius:2px;overflow:hidden">'
            +'<div style="position:absolute;left:0;top:0;height:100%;width:'+barPct.toFixed(1)+'%;background:'+col+';opacity:.8;border-radius:2px"></div>'
            +'</div>'
            +'<div style="text-align:right;font-size:.8125rem;font-weight:700;color:'+col+'">'+(pct>=0?'+':'')+pct.toFixed(0)+'%</div>'
            +'</div>';
        }).join('');
        const legend = '<div style="display:flex;gap:1.25rem;font-size:.6875rem;margin-top:.75rem;flex-wrap:wrap;color:var(--text-muted)">'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('red')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Crítico (≤-25%)</span>'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('yellow')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Moderado (-10% a -25%)</span>'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('gray')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Leve (&gt;-10%)</span>'
          +'<span>· ordenado do maior ao menor impacto</span></div>';
        sensChart = insight(
          chartTitle('O que acontece se cada risco se materializar')
          +header+rows+legend,
          sensInsight, worstPct<-15?'bad':'warn');
      }
      // Detailed table: scenario, cause, leads, cpl, delta, mitigation
      varHtml = '<div style="margin-top:.5rem;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Cenários detalhados</div>'
        +fs.variations.map(v => {
          const pct = getPct(v);
          const toneColor = (pct??0)<-15?'danger':(pct??0)<0?'yellow':'gray';
          return cd(getName(v),
            (v.cause?'<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.375rem"><strong>Causa:</strong> '+E(v.cause)+'</div>':'')
            +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.375rem">'
            +(getLeads(v)!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">Leads/mês</div><div style="font-size:.875rem;font-weight:700">'+N(getLeads(v))+'</div></div>':'')
            +(getCpl(v)!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">CPL</div><div style="font-size:.875rem;font-weight:700">'+BRL(getCpl(v))+'</div></div>':'')
            +(pct!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">Δ vs base</div><div style="font-size:.875rem;font-weight:700;color:var(--'+(pct<0?'danger':'success')+')">'+(pct>=0?'+':'')+pct.toFixed(0)+'%</div></div>':'')
            +'</div>'
            +(v.impact_on_lifetime_value?'<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.25rem">LTV: '+E(v.impact_on_lifetime_value)+'</div>':'')
            +(v.mitigation?'<div style="font-size:.75rem;padding:.375rem .5rem;background:var(--surface);border-left:2px solid var(--success);border-radius:3px"><strong style="color:var(--success)">Mitigação:</strong> '+E(v.mitigation)+'</div>':''),
            toneColor);
        }).join('');
    }
    h += sc('Análise de Sensibilidade do Forecast',
      (fs.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .75rem">'+E(fs.description)+'</p>':'')
      +bcHtml+varHtml);
  }

  // 90-day goal
  const g90 = d.realistic_goal_90d || d.realistic_goal;
  if (g90) {
    h += sc('Meta Realista — 90 Dias',
      '<div class="gr gr--4">'

'ee-s2-diagnostico-criativos'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);
  const counts = d.counts || d.summary_counts || {};
  if (d.total_creatives_analyzed || d.average_score) {
    h += '<div class="gr gr--3">'
      +mt(d.total_creatives_analyzed||'—','Criativos Analisados','')
      +mt(d.average_score!=null?(d.average_score+'/25'):'—','Score Médio',d.average_score>=20?'green':d.average_score>=13?'yellow':'red')
      +(counts.keep_count!=null?mt(counts.keep_count,'Manter','green'):'')
      +'</div>';
  }
  if (d.creative_matrix?.length) {
    const vc = {manter:'green',otimizar:'yellow',eliminar:'danger'};
    // Donut de veredictos
    const verdictCount = {};
    d.creative_matrix.forEach(c => { verdictCount[c.verdict] = (verdictCount[c.verdict]||0) + 1; });
    const verdictLabels = {manter:'Manter',otimizar:'Otimizar',eliminar:'Eliminar'};
    const verdictTone = {manter:'green',otimizar:'yellow',eliminar:'red'};
    const donutData = Object.keys(verdictCount).map(k=>({
      label: verdictLabels[k]||k, value: verdictCount[k], tone: verdictTone[k]||'gray',
    }));
    const total = d.creative_matrix.length;
    const elimPct = Math.round(((verdictCount.eliminar||0)/total)*100);
    const manterPct = Math.round(((verdictCount.manter||0)/total)*100);
    const verdictInsight = elimPct >= 40
      ? elimPct+'% dos criativos precisam ser eliminados — revisar briefing de produção antes de nova leva.'
      : manterPct >= 60
        ? manterPct+'% dos criativos estão saudáveis — base sólida para escalar.'
        : 'Mix equilibrado: '+manterPct+'% manter, '+elimPct+'% eliminar — priorizar otimização dos intermediários.';
    h += sc('Veredicto do Pack Atual',
      insight(chartDonut(donutData, {title:'Distribuição de Veredictos'}),
        verdictInsight, elimPct>=40?'bad':manterPct>=60?'good':'warn'));
    h += sc('Matriz de Avaliação', tb(['#','Tipo','Hook','Clareza','ICP','CTA','Visual','Total','Veredicto'],
      d.creative_matrix.map(c=>[E(c.number),E(c.type),E(c.hook_score),E(c.clarity_score),E(c.icp_coherence_score),E(c.cta_score),E(c.visual_score),
        '<strong>'+E(c.total_score)+'/25</strong>',tg(c.verdict,vc[c.verdict])])));
  }
  if (d.patterns_identified?.length) {
    h += sc('Padrões Identificados', d.patterns_identified.map(p=>cd(p.pattern,E(p.example),'yellow')).join(''));
  }
  if (d.production_briefing) {
    const b = d.production_briefing;
    h += sc('Briefing de Produção', cd('Direção de Hook',E(b.hook_direction),'red')
      +'<p><strong>Formato prioritário:</strong> '+E(b.priority_format)+'</p>'
      +(b.visual_elements?'<p><strong>Incluir:</strong> '+b.visual_elements.map(v=>E(v)).join(', ')+'</p>':'')
      +(b.avoid_elements?'<p><strong>Evitar:</strong> '+b.avoid_elements.map(v=>E(v)).join(', ')+'</p>':''));
  }
  return h;
},

'ee-s3-copy-anuncios'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);
  if (d.total_variations) h += mt(d.total_variations,'Total de Variações','red');
  if (d.funnel_stages?.length) {
    const fn = {topo_de_funil:'Topo de Funil',meio_de_funil:'Meio de Funil',fundo_de_funil:'Fundo de Funil',remarketing:'Remarketing'};
    // Donut: distribuição de variações por estágio
    const toneByStage = {topo_de_funil:'blue',meio_de_funil:'yellow',fundo_de_funil:'green',remarketing:'red'};
    const stageData = d.funnel_stages.map(s=>{
      const count = (s.platforms||[]).reduce((sum,p)=>sum+(p.variations?.length||0),0);
      return {label: fn[s.name]||s.name, value: count, tone: toneByStage[s.name]||'gray'};
    }).filter(x=>x.value>0);
    if (stageData.length >= 2) {
      const top = [...stageData].sort((a,b)=>b.value-a.value)[0];
      const fund = stageData.find(x=>x.label.includes('Fundo'));
      const distInsight = 'Maior volume em "'+top.label+'" ('+top.value+' variações). '
        +(fund && fund.value < top.value/2 ? 'Atenção: fundo de funil sub-representado — leads quentes podem ficar sem copy dedicada.' : 'Mix coerente entre etapas.');
      h += sc('Distribuição de Copy por Estágio',
        insight(chartDonut(stageData, {title:'Variações por Funil'}),
          distInsight, fund && fund.value < top.value/2 ? 'warn' : 'good'));
    }
    d.funnel_stages.forEach(stage => {
      let rows = [];
      (stage.platforms||[]).forEach(plat => {
        (plat.variations||[]).forEach(v => {
          rows.push([E(plat.name),E(v.type),E(v.headline||v.text||'').substring(0,80)+(v.headline?.length>80?'...':''),E(v.cta||'')]);
        });
      });
      if (rows.length) h += sc((fn[stage.name]||stage.name)+' — '+E(stage.tone||''), tb(['Plataforma','Tipo','Copy','CTA'],rows));
    });
  }
  if (d.copy_rules_applied?.length) {
    h += sc('Regras Aplicadas', '<ul class="cl">'+d.copy_rules_applied.map(r=>'<li><span class="cl__icon cl__icon--done">&#10003;</span><span>'+E(r)+'</span></li>').join('')+'</ul>');
  }
  return h;
},

    const hk = {dor:'danger',resultado:'green',curiosidade:'yellow',social_proof:'green',urgencia:'red'};

    const hookData = Object.keys(hookCount).map(k=>({
      label: hookLabel[k]||k, value: hookCount[k], tone: hookToneMap[k]||'gray',
    }));
    if (hookData.length >= 2) {
      const top = [...hookData].sort((a,b)=>b.value-a.value)[0];
      const hookInsight = 'Hook dominante: "'+top.label+'" ('+top.value+' criativos). '
        +(top.value > d.variations.length * 0.6 ? 'Concentração alta — diversificar ângulos para mitigar fadiga criativa.' : 'Diversidade de ângulos saudável para teste A/B.');
      h += sc('Diversidade de Hooks',

    h += sc('Variações', d.variations.map(v=>
      '<div class="cd cd--'+(hk[v.hook_type]||'red')+'"><div class="cd__title">'+tg(v.hook_type,hk[v.hook_type])+' '+E(v.hook_text)+'</div>'

      +(g.combinations?.length?'<p><strong>Combinações:</strong> '+g.combinations.map(c=>E(c)).join(', ')+'</p>':''));
  }
  return h;

        insight(chartDonut(platData, {title:'% do Budget'}), platInsight, top.value>=70?'warn':'good')
        +'<div class="gr gr--'+Math.min(4,d.platform_distribution.length)+'">'
        +d.platform_distribution.map(p=>mt(PCT(p.percentage),E(p.platform),'red')+'<div style="text-align:center;font-size:.75rem;color:var(--text-muted)">'+BRL(p.monthly_value)+'/mês</div>').join('')+'</div>');
    } else {
      h += sc('Distribuição por Plataforma', '<div class="gr gr--'+Math.min(4,d.platform_distribution.length)+'">'
        +d.platform_distribution.map(p=>mt(PCT(p.percentage),E(p.platform),'red')+'<div style="text-align:center;font-size:.75rem;color:var(--text-muted)">'+BRL(p.monthly_value)+'/mês</div>').join('')+'</div>');
    }

'ee-s4-diagnostico-comercial'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);
  if (d.funnel_diagnosis?.length) {
    // Funnel: simular volume decaindo com base em current_rate
    let simVol = 100;
    const funnelStages = d.funnel_diagnosis.map((f,i)=>{
      const stage = {name: f.stage, volume: Math.round(simVol), highlight: f.status==='critical'||f.status==='low'};
      if (f.current_rate!=null) simVol = simVol * f.current_rate;
      return stage;
    });
    // Pior gap
    const worst = [...d.funnel_diagnosis].filter(f=>f.gap!=null).sort((a,b)=>a.gap-b.gap)[0];
    const funnelInsight = worst
      ? 'Maior gargalo: "'+worst.stage+'" com gap de '+worst.gap.toFixed(1)+'pp vs benchmark. '+(worst.bottleneck||'').substring(0,100)
      : '';
    h += sc('Funil de Vendas',
      insight(chartFunnel(funnelStages, {title:'Afunilamento (% retenção)', fmt:v=>v+'%'}),
        funnelInsight, worst && worst.gap<-10?'bad':worst && worst.gap<0?'warn':'good')
      +tb(['Etapa','Taxa Atual','Benchmark','Gap','Status','Gargalo'],
      d.funnel_diagnosis.map(f=>[E(f.stage),PCT(f.current_rate),PCT(f.benchmark),
        '<span style="color:var(--'+(f.gap>=0?'success':'danger')+')">'+((f.gap>=0?'+':'')+N(f.gap))+'pp</span>',
        tg(CLS[f.status]||f.status,CLC[f.status]),E(f.bottleneck)])));
  }
  if (d.primary_bottleneck) {
    h += cd('Gargalo Principal','<strong>'+E(d.primary_bottleneck.stage)+':</strong> '+E(d.primary_bottleneck.description)
      +'<div class="cd__meta">'+E(d.primary_bottleneck.estimated_improvement)+'</div>','danger');
  }
  if (d.objection_map?.length) {
    h += sc('Mapa de Objeções', d.objection_map.map(o=>
      cd(o.objection+' '+tg(o.type,{price:'red',urgency:'yellow',authority:'gray',trust:'yellow',need:'red',competitor:'yellow'}[o.type]),
        '<strong>Resposta:</strong> '+E(o.recommended_response)+'<br><strong>Prevenção SDR:</strong> '+E(o.sdr_prevention),
        {price:'danger',trust:'yellow'}[o.type])
    ).join(''));
  }
  if (d.qualification_criteria) {
    const qc = d.qualification_criteria;
    const renderStar = (label, data, color) => data ? cd(label,
      E(data.profile)+(data.mandatory_signals||data.signals?'<ul style="margin:.5rem 0 0;padding-left:1rem">'
      +(data.mandatory_signals||data.signals||[]).map(s=>'<li style="font-size:.8125rem">'+E(s)+'</li>').join('')+'</ul>':'')
      +'<div class="cd__meta">Ação: '+E(data.action)+'</div>',color) : '';
    h += sc('Critérios de Qualificação', renderStar('5 Estrelas',qc.five_star,'green')
      +renderStar('4 Estrelas',qc.four_star,'green')+renderStar('3 Estrelas',qc.three_star,'yellow')
      +renderStar('1-2 Estrelas',qc.one_two_star,'danger'));
  }
  return h;
},

'ee-s4-cliente-oculto'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);
  if (d.evaluation?.overall_score != null) {
    const s = d.evaluation.overall_score;
    h += '<div class="gr gr--3">'
      +mt(s.toFixed(1)+'/10','Nota Geral',s>=7?'green':s>=4?'yellow':'red')
      +mt(CLS[d.evaluation.classification]||d.evaluation.classification||'—','Classificação','')
      +(d.simulation_metadata?.total_duration_minutes?mt(d.simulation_metadata.total_duration_minutes+'min','Duração',''):'')
      +'</div>';
    // Gauge da nota geral vs benchmark 7/10
    const ocTone = s>=7?'good':s>=4?'warn':'bad';
    const ocInsight = 'Nota '+s.toFixed(1)+'/10. '
      +(s>=7?'Atendimento saudável — refinar scripts para escalar consistência.'
        :s>=4?'Atendimento inconsistente — gaps em qualificação e follow-up custam conversão.'
        :'CRÍTICO: prejuízo direto em conversão. Intervenção de processo imediata.');
    h += insight(chartGauge(s, 7, 10, {title:'Nota do Atendimento', fmt:v=>v.toFixed(1)+'/10'}), ocInsight, ocTone);
  }
  if (d.buyer_profile) {
    const b = d.buyer_profile;
    h += sc('Perfil do Comprador', cd(b.name,
      '<strong>Situação:</strong> '+E(b.situation)+'<br>'
      +'<strong>Urgência:</strong> '+tg(b.urgency,{high:'red',medium:'yellow',low:'green'}[b.urgency])+' '
      +'<strong>Objeção:</strong> '+E(b.main_objection),'red'));
  }
  if (d.evaluation?.criteria_scores?.length) {
    const critBars = d.evaluation.criteria_scores.map(c=>({
      label: c.criterion,
      value: c.score,
      tone: c.score>=7?'green':c.score>=4?'yellow':'red',
    }));
    const critInsight = (() => {
      const weakest = [...critBars].sort((a,b)=>a.value-b.value)[0];
      const avg = critBars.reduce((s,x)=>s+x.value,0)/critBars.length;
      return weakest
        ? 'Critério mais fraco: "'+weakest.label+'" ('+weakest.value+'/10). Média geral: '+avg.toFixed(1)+'/10 — focar aqui primeiro para puxar a nota geral.'
        : '';
    })();
    h += sc('Scores por Critério',
      insight(chartHBar(critBars, {title:'Avaliação por Dimensão', fmt:v=>v+'/10', labelWidth:160}),
        critInsight, critBars.some(x=>x.value<4)?'bad':critBars.some(x=>x.value<7)?'warn':'good')
      +'<div class="gr gr--2">'+d.evaluation.criteria_scores.map(c=>
        '<div class="cd"><div class="cd__title">'+E(c.criterion)+' <span style="color:var(--'+(c.score>=7?'success':c.score>=4?'warning':'danger')+')">'+c.score+'/10</span></div>'
        +'<div class="cd__body">'+E(c.observation)+'</div></div>'
      ).join('')+'</div>');
  }
  if (d.evaluation?.strengths?.length || d.evaluation?.critical_improvements?.length) {
    h += sc('Pontos Fortes & Melhorias', '<div class="gr gr--2">'
      +cd('Pontos Fortes',(d.evaluation.strengths||[]).map(s=>'<div style="margin-bottom:.25rem;color:var(--success)">&#10003; '+E(s)+'</div>').join(''),'green')
      +cd('Melhorias Críticas',(d.evaluation.critical_improvements||[]).map(s=>'<div style="margin-bottom:.25rem;color:var(--danger)">&#10007; '+E(s)+'</div>').join(''),'danger')
      +'</div>');
  }
  if (d.evaluation?.sdr_impact_per_improvement?.length) {
    h += sc('Impacto do SDR IA', tb(['Melhoria','Solução SDR','Impacto'],
      d.evaluation.sdr_impact_per_improvement.map(i=>[E(i.improvement),E(i.sdr_solution),tg(i.estimated_impact,'green')])));
  }
  return h;
},

// ===== ENGINE =====
function init() {
  const data = PORTAL_DATA;
  if (!data || !data.client) {
    const container = document.getElementById('presSlides');
    if (container) container.innerHTML = '<div class="pres-empty" style="height:100vh"><div class="pres-empty__icon">&#128203;</div><div class="pres-empty__text">Nenhum dado de portal encontrado. Execute render_portal.sh para gerar.</div></div>';
    return;
  }

  const client = data.client;
  const progress = data.progress || {};
  const outputs = data.outputs || {};
  const hasSales = client.modulo_vendas !== false;

  document.title = 'Portal — ' + (client.name || 'Cliente') + ' | V4';

  const activeWeeks = WEEKS.filter(w => !w.sales || hasSales);

  requestAnimationFrame(() => {
    PRES.build(activeWeeks, progress, outputs);
    PRES.enter();
  });
}

function renderSkill(skill, progress, outputs) {
  const st = progress.skills?.[skill.id]?.status || 'pending';
  const data = outputs[skill.id];

  const dots = { completed: 'done', in_progress: 'wip', pending: 'wait' };
  const badges = { completed: ['done','Concluído'], in_progress: ['wip','Em andamento'], pending: ['wait','Pendente'] };
  const [bc, bl] = badges[st] || badges.pending;

  let content = '';
  if (st === 'completed' && data && R[skill.id]) {
    try { content = '<div class="skill__body">' + R[skill.id](data) + '</div>'; }
    catch(e) { content = '<div class="skill__body"><p style="color:var(--danger)">Erro ao renderizar: ' + E(e.message) + '</p></div>'; }
  } else if (st === 'in_progress') {
    content = '<div class="skill__empty">Entrega em desenvolvimento...</div>';
  }

  return '<div class="skill skill--' + st + '">'
    + '<div class="skill__head">'
    +   '<span class="skill__dot skill__dot--' + (dots[st]||'wait') + '"></span>'
    +   '<span class="skill__name">' + E(skill.name) + '</span>'
    +   '<span class="skill__badge skill__badge--' + bc + '">' + E(bl) + '</span>'
    + '</div>'
    + content
    + '</div>';
}

function toggleWeek(n, forceOpen) {
  const body = document.getElementById('body-' + n);
  const chev = document.getElementById('chev-' + n);
  if (!body) return;

  if (body.style.maxHeight && !forceOpen) {
    body.style.maxHeight = null;
    if (chev) chev.classList.remove('week__chev--open');
  } else {
    body.style.maxHeight = body.scrollHeight + 'px';
    if (chev) chev.classList.add('week__chev--open');
  }
}

// ===== PRESENTATION MODE =====
const PRES = {
  slides: [], current: 0, active: false,

  build(weeks, progress, outputs) {
    const container = document.getElementById('presSlides');
    if (!container) return;
    container.innerHTML = '';
    this.slides = [];

    const badges = { completed: ['done','Concluído'], in_progress: ['wip','Em andamento'], pending: ['wait','Pendente'] };

    // ── Slide 0: Resumo Executivo (único slide scrollável) ──
    const allSkills = weeks.flatMap(w => w.skills);
    const completedCount = allSkills.filter(s => (progress.skills?.[s.id]?.status) === 'completed').length;
    const totalCount = allSkills.length;
    const pctTotal = totalCount > 0 ? Math.round(completedCount / totalCount * 100) : 0;

    const summarySlide = document.createElement('div');
    summarySlide.className = 'pres-slide pres-slide--summary';

    const heroDiv = document.createElement('div');
    heroDiv.className = 'pres-summary-hero';
    heroDiv.innerHTML =
      '<div class="pres-summary-client">' + E(PORTAL_DATA.client?.name || 'Cliente') + '</div>'
      + '<p class="pres-summary-subtitle">Estruturação Estratégica com IA</p>'
      + '<div class="pres-summary-stat">'
      +   '<div class="pres-summary-stat-bar"><div class="pres-summary-stat-fill" style="width:' + pctTotal + '%"></div></div>'
      +   '<div class="pres-summary-stat-label">' + completedCount + ' de ' + totalCount + ' entregas &mdash; ' + pctTotal + '% concluído</div>'
      + '</div>'
      + '<button class="pres-summary-cta" onclick="PRES.next()">Ver Entregas &#8594;</button>';

    const weeksGrid = document.createElement('div');
    weeksGrid.className = 'pres-summary-weeks';

    weeks.forEach(week => {
      const done = week.skills.filter(s => (progress.skills?.[s.id]?.status) === 'completed').length;
      const wip  = week.skills.filter(s => (progress.skills?.[s.id]?.status) === 'in_progress').length;
      const pctW = week.skills.length > 0 ? Math.round(done / week.skills.length * 100) : 0;
      const isCurrent = progress.current_week === week.n;
      // First skill index for this week (will be offset by 1 because slide 0 is summary)
      const weekFirstIdx = weeks.slice(0, weeks.indexOf(week)).reduce((acc, w) => acc + w.skills.length, 0) + 1;

      const card = document.createElement('div');
      card.className = 'pres-summary-week-card' + (isCurrent ? ' pres-summary-week-card--current' : '');
      card.innerHTML =
        '<div class="pres-summary-week-tag">Semana ' + week.n + '</div>'
        + '<div class="pres-summary-week-title">' + E(week.title) + '</div>'
        + '<div class="pres-summary-week-bar"><div class="pres-summary-week-fill" style="width:' + pctW + '%"></div></div>'
        + '<div class="pres-summary-week-count">' + done + '/' + week.skills.length
        + (wip > 0 ? ' &nbsp;&middot;&nbsp; <span style="color:var(--warning)">' + wip + ' em andamento</span>' : '')
        + '</div>';
      card.onclick = () => PRES.go(weekFirstIdx);
      weeksGrid.appendChild(card);
    });

    // Cards de diagnósticos concluídos
    const diagItems = [];
    weeks.forEach(week => {
      week.skills.forEach(skill => {
        if ((progress.skills?.[skill.id]?.status) !== 'completed') return;
        const data = outputs[skill.id];
        if (!data) return;
        const summaryText = typeof data.summary === 'string' ? data.summary
          : typeof data.executive_summary === 'string' ? data.executive_summary : null;
        if (!summaryText) return;
        diagItems.push({ week, skill, data, summaryText });
      });
    });

    if (diagItems.length > 0) {
      const diagSection = document.createElement('div');
      diagSection.className = 'pres-summary-diag';
      diagSection.innerHTML = '<div class="pres-summary-diag-heading">Resumo dos Diagnósticos</div>';

      const clsMap = { critical:'red', low:'red', medium:'yellow', good:'green', excellent:'green' };

      diagItems.forEach(({ week, skill, data, summaryText }) => {
        const card = document.createElement('div');
        card.className = 'pres-summary-diag-card';

        // Metric block (score or benchmark)
        let metricHtml = '';
        if (data.overall_score != null) {
          const cls = clsMap[data.overall_classification] || 'gray';
          const label = { critical:'Crítico', low:'Baixo', medium:'Médio', good:'Bom', excellent:'Excelente' }[data.overall_classification] || '';
          metricHtml = '<div class="pres-summary-diag-metric">'
            + '<div class="pres-summary-diag-metric-val pres-summary-diag-metric-val--' + cls + '">' + data.overall_score + '</div>'
            + '<div class="pres-summary-diag-metric-lbl">' + (label || '/100') + '</div>'
            + '</div>';
        } else if (data.score != null) {
          metricHtml = '<div class="pres-summary-diag-metric">'
            + '<div class="pres-summary-diag-metric-val">' + data.score + '</div>'
            + '<div class="pres-summary-diag-metric-lbl">Score</div>'
            + '</div>';
        }

        card.innerHTML =
          '<div class="pres-summary-diag-tag">Semana ' + week.n + ' &mdash; ' + E(week.title) + '</div>'
          + '<div class="pres-summary-diag-name">' + E(skill.name) + '</div>'
          + '<div class="pres-summary-diag-text">' + E(summaryText) + '</div>'
          + metricHtml;

        diagSection.appendChild(card);
      });

      summarySlide.appendChild(heroDiv);
      summarySlide.appendChild(weeksGrid);
      summarySlide.appendChild(diagSection);
    } else {
      summarySlide.appendChild(heroDiv);
      summarySlide.appendChild(weeksGrid);
    }

    container.appendChild(summarySlide);
    this.slides.push({ el: summarySlide, n: 0, title: 'Resumo', skillName: 'Resumo Executivo', isSummary: true });

    // ── Slides 1..N: skills + transições entre semanas ──
    weeks.forEach((week, wi) => {
      week.skills.forEach(skill => {
        const st = (progress.skills?.[skill.id]?.status) || 'pending';
        const data = outputs[skill.id];
        const [bc, bl] = badges[st] || badges.pending;

        const slide = document.createElement('div');
        slide.className = 'pres-slide';

        // Inner wrapper (flex column, fills slide)
        const inner = document.createElement('div');
        inner.className = 'pres-slide-inner';

        // Fixed header
        const header = document.createElement('div');
        header.className = 'pres-slide-header';
        const headerInner = document.createElement('div');
        headerInner.className = 'pres-slide-header-inner';
        headerInner.innerHTML =
          '<div class="pres-slide-breadcrumb">Semana ' + week.n + ' &mdash; ' + E(week.title) + '</div>'
          + '<div class="pres-skill-head">'
          +   '<span class="pres-skill-name">' + E(skill.name) + '</span>'
          +   '<span class="skill__badge skill__badge--' + bc + '">' + E(bl) + '</span>'
          + '</div>';
        header.appendChild(headerInner);

        // Scrollable content area (bounded to viewport)
        const contentWrap = document.createElement('div');
        contentWrap.className = 'pres-slide-content';
        const contentInner = document.createElement('div');
        contentInner.className = 'pres-slide-content-inner';

        if (st === 'completed' && data && R[skill.id]) {
          try { contentInner.innerHTML = R[skill.id](data); }
          catch(e) { contentInner.innerHTML = '<p style="color:var(--danger)">Erro ao renderizar: ' + E(e.message) + '</p>'; }
        } else if (st === 'in_progress') {
          contentInner.innerHTML = '<div class="pres-empty"><div class="pres-empty__icon">&#9203;</div><div class="pres-empty__text">Entrega em desenvolvimento...</div></div>';
        } else {
          contentInner.innerHTML = '<div class="pres-empty"><div class="pres-empty__icon">&#128203;</div><div class="pres-empty__text">Esta entrega ainda não foi iniciada.</div></div>';
        }

        contentWrap.appendChild(contentInner);
        inner.appendChild(header);
        inner.appendChild(contentWrap);
        slide.appendChild(inner);
        container.appendChild(slide);

        this.slides.push({ el: slide, n: week.n, title: week.title, skillName: skill.name });
      });

      // ── Slide de transição ou conclusão ──
      const isLast = wi === weeks.length - 1;
      const nextWeek = weeks[wi + 1];
      const transEl = document.createElement('div');

      if (!isLast) {
        transEl.className = 'pres-slide pres-slide--transition';
        transEl.innerHTML =
          '<div class="pres-trans-inner">'
          + '<div>'
          +   '<div class="pres-trans-label">Semana ' + week.n + ' &mdash; ' + E(week.title) + '</div>'
          +   '<div class="pres-trans-heading">O que concluímos</div>'
          +   '<ul class="pres-trans-list">'
          +     week.skills.map(s => {
                  const st = (progress.skills?.[s.id]?.status) || 'pending';
                  const done = st === 'completed';
                  return '<li class="pres-trans-item pres-trans-item--' + (done ? 'done' : 'pending') + '">'
                    + '<span class="pres-trans-icon pres-trans-icon--' + (done ? 'done' : 'pending') + '">' + (done ? '&#10003;' : '&#9675;') + '</span>'
                    + E(s.name) + '</li>';
                }).join('')
          +   '</ul>'
          + '</div>'
          + '<div class="pres-trans-divider"></div>'
          + '<div>'
          +   '<div class="pres-trans-label">A seguir &middot; Semana ' + nextWeek.n + '</div>'
          +   '<div class="pres-trans-heading">' + E(nextWeek.title) + '</div>'
          +   '<ul class="pres-trans-list">'
          +     nextWeek.skills.map(s =>
                  '<li class="pres-trans-item">'
                  + '<span class="pres-trans-icon pres-trans-icon--next">&#8594;</span>'
                  + E(s.name) + '</li>'
                ).join('')
          +   '</ul>'
          + '</div>'
          + '</div>';
        container.appendChild(transEl);
        this.slides.push({ el: transEl, n: week.n, title: week.title, skillName: 'Próximos Passos', isTransition: true });
      } else {
        transEl.className = 'pres-slide pres-slide--final';
        transEl.innerHTML =
          '<div class="pres-final-inner">'
          + '<div class="pres-final-badge">Estruturação Estratégica com IA</div>'
          + '<div class="pres-final-congrats">Parabéns!</div>'
          + '<div class="pres-final-sub">Você encerrou a</div>'
          + '<div class="pres-final-title">Estruturação Estratégica</div>'
          + '<div class="pres-final-powered">AI Powered</div>'
          + '<div class="pres-final-vaas">Está pronto para atuar no modelo <strong>VAAS</strong></div>'
          + '</div>';
        container.appendChild(transEl);
        this.slides.push({ el: transEl, n: week.n, title: 'Fim', skillName: 'Conclusão', isFinal: true });
      }
    });

    this._updateUI();
  },

  enter() {
    if (!this.slides.length) return;
    this.active = true;
    this.current = 0;
    this.slides.forEach(s => s.el.classList.remove('pres-slide--active', 'pres-slide--prev'));
    this.slides[0].el.classList.add('pres-slide--active');
    this._updateUI();
  },

  exit() {
    this.go(0);
  },

  go(n) {
    const total = this.slides.length;
    if (n < 0 || n >= total || n === this.current) return;
    const forward = n > this.current;
    const oldEl = this.slides[this.current].el;
    const newEl = this.slides[n].el;

    oldEl.classList.remove('pres-slide--active');
    oldEl.classList.toggle('pres-slide--prev', forward);

    newEl.classList.remove('pres-slide--prev');
    newEl.classList.add('pres-slide--active');
    newEl.scrollTop = 0;

    this.current = n;
    this._updateUI();
  },

  next() { this.go(this.current + 1); },
  prev() { this.go(this.current - 1); },

  _updateUI() {
    const n = this.current, total = this.slides.length;
    const info = document.getElementById('presInfo');
    if (info) {
      const s = this.slides[n];
      info.textContent = s?.isSummary ? 'Resumo Executivo' : (n) + ' / ' + (total - 1);
    }
    const prevBtn = document.getElementById('presPrev');
    const nextBtn = document.getElementById('presNext');
    if (prevBtn) prevBtn.disabled = n === 0;
    if (nextBtn) nextBtn.disabled = n === total - 1;
    const dotsEl = document.getElementById('presDots');
    if (dotsEl) {
      const parts = [];
      // Dot 0: resumo executivo
      parts.push('<button class="pres-dot pres-dot--summary' + (n === 0 ? ' pres-dot--active' : '') + '" onclick="PRES.go(0)" title="Resumo Executivo"></button>');
      // Separator
      parts.push('<span style="width:8px;display:inline-block"></span>');
      // One dot per week
      const seen = new Set();
      const currentWeekN = this.slides[n]?.n;
      this.slides.forEach((s, i) => {
        if (s.isSummary || seen.has(s.n)) return;
        seen.add(s.n);
        const active = !this.slides[n]?.isSummary && s.n === currentWeekN;
        parts.push('<button class="pres-dot' + (active ? ' pres-dot--active' : '') + '" onclick="PRES.go(' + i + ')" title="Semana ' + s.n + '"></button>');
      });
      dotsEl.innerHTML = parts.join('');
    }
  }
};

document.addEventListener('keydown', function(e) {
  if (!PRES.active) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); PRES.next(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); PRES.prev(); }
});


document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
