        +(ma.avg_ctr!=null?mt(ma.avg_ctr.toFixed(2)+'%','CTR médio',ma.avg_ctr>=2?'green':ma.avg_ctr>=1.2?'yellow':'red'):'')
        +(ma.avg_cpm!=null?mt(BRL(ma.avg_cpm),'CPM médio',ma.avg_cpm<=10?'green':ma.avg_cpm<=15?'yellow':'red'):'')
        +(ma.total_reach_90d!=null?mt(N(ma.total_reach_90d),'Alcance 90d',''):(ma.total_clicks_90d!=null?mt(N(ma.total_clicks_90d),'Clicks 90d',''):''))
        +'</div>';
      const sub = '<div style="display:flex;gap:.75rem;flex-wrap:wrap;font-size:.75rem;color:var(--text-muted);margin-bottom:.5rem">'
        +(monthly!=null?'<span>Média mensal: <strong style="color:var(--text-secondary)">'+BRL(monthly)+'</strong></span>':'')
        +(ma.total_clicks_90d!=null?'<span>Clicks: <strong style="color:var(--text-secondary)">'+N(ma.total_clicks_90d)+'</strong></span>':'')
        +(ma.total_impressions_90d!=null?'<span>Impressões: <strong style="color:var(--text-secondary)">'+N(ma.total_impressions_90d)+'</strong></span>':'')
        +(ma.total_ads!=null?'<span>Ads: <strong style="color:var(--text-secondary)">'+N(ma.total_ads)+'</strong></span>':'')
        +(ma.total_campaigns!=null?'<span>Campanhas: <strong style="color:var(--text-secondary)">'+N(ma.total_campaigns)+'</strong></span>':'')
        +'</div>';
      const diag = ma.strategic_diagnosis
        ? cd('Resumo Executivo', '<div style="font-size:.875rem;line-height:1.5;color:var(--text-secondary)">'+E(ma.strategic_diagnosis)+'</div>')
        : '';
      maHead = cards + sub + diag;
    }

    // Monthly evolution table for Meta
    let maEvol = '';
    if (ma.monthly_evolution?.length) {
      maEvol = evTable(ma.monthly_evolution, [
        {key:'spend',      label:'Gasto',       fmt: v=>'R$'+v.toFixed(0), badUp:true},
        {key:'impressions',label:'Impressões',   fmt: v=>N(v),              badUp:false},
        {key:'clicks',     label:'Clicks',       fmt: v=>N(v),              badUp:false},
        {key:'reach',      label:'Alcance',      fmt: v=>N(v),              badUp:false},
        {key:'cpm',        label:'CPM',          fmt: v=>'R$'+v.toFixed(2), badUp:true, colorFn:(v)=>v>15?'red':v>10?'yellow':'green'},
        {key:'ctr',        label:'CTR',          fmt: v=>v.toFixed(2)+'%',  badUp:false, colorFn:(v)=>v<1?'red':v<2?'yellow':'green'},
      ]);
    }

    let maCritical = '';
    if (ma.critical_issues?.length) {
      maCritical = ma.critical_issues.map(i=>
        '<div style="font-size:.8125rem;color:var(--danger);margin-bottom:.3rem">&#9650; '+E(i)+'</div>'
      ).join('');
    }

    let maBench = '';
    if (ma.metrics_vs_benchmark?.length) {
      maBench = tb(['Métrica','Atual','Benchmark','Status'],
        ma.metrics_vs_benchmark.map(m=>[
          E(m.metric), E(m.atual), E(m.benchmark),
          tg(m.gap, m.status==='ok'?'green':m.status==='critical'?'danger':'yellow')
        ]));
    }

    let maBest = '';
    if (ma.best_historical?.length) {
      maBest = ma.best_historical.map(c=>
        '<div style="margin-bottom:.375rem"><div style="font-size:.8125rem;font-weight:600;color:var(--text-primary)">'+E(c.name)+'</div>'
        +'<div style="font-size:.75rem;color:var(--text-muted)">CPM R$'+E(c.cpm)+' · '+N(c.impressions)+' impressões · '+E(c.note)+'</div></div>'
      ).join('');
    }

    h += sc('Meta Ads', maHead
      +(maEvol ? '<div style="margin-bottom:.75rem"><div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Evolução Mensal</div>'+maEvol+'</div>' : '')
      +cd('Problemas Críticos', maCritical, 'danger')
      +(maBench ? '<div style="margin-top:.75rem">'+maBench+'</div>' : '')
      +(maBest ? cd('Histórico de Destaque', maBest) : '')
    );

    // ── Galeria de Criativos (V4MOS) ──
    if (ma.creative_gallery?.length) {
      const gs = ma.creative_gallery_summary || {};
      const verdictColor = {Manter:'var(--success)', Otimizar:'var(--warning)', Eliminar:'var(--danger)'};
      const summaryHead = '<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;font-size:.75rem">'
        +(gs.manter!=null?'<div style="padding:.375rem .75rem;background:rgba(34,197,94,0.12);border:1px solid var(--success);border-radius:6px;color:var(--success);font-weight:700">'+gs.manter+' Manter</div>':'')
        +(gs.otimizar!=null?'<div style="padding:.375rem .75rem;background:rgba(234,179,8,0.12);border:1px solid var(--warning);border-radius:6px;color:var(--warning);font-weight:700">'+gs.otimizar+' Otimizar</div>':'')
        +(gs.eliminar!=null?'<div style="padding:.375rem .75rem;background:rgba(239,68,68,0.12);border:1px solid var(--danger);border-radius:6px;color:var(--danger);font-weight:700">'+gs.eliminar+' Eliminar</div>':'')
        +(gs.total_ads?'<div style="padding:.375rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-muted)">Exibindo '+gs.total_displayed+' de '+gs.total_ads+' ads</div>':'')
        +'</div>';
      const cards = ma.creative_gallery.map(g => {
        const vCol = verdictColor[g.verdict] || 'var(--text-muted)';
        const ctrCol = (g.ctr||0)>=1.5?'var(--success)':(g.ctr||0)>=0.8?'var(--warning)':'var(--danger)';
        const cpcCol = (g.cpc||99)<=1.0?'var(--success)':(g.cpc||99)<=1.8?'var(--warning)':'var(--danger)';
        const perm = g.instagram_permalink_url || '';
        // Normaliza permalink Instagram → URL de embed (.../embed/captioned/)
        const embedUrl = perm ? (perm.replace(/\/$/,'') + '/embed/captioned/') : '';
        return '<div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid '+vCol+';border-radius:8px;overflow:hidden;display:flex;flex-direction:column">'
          +'<div style="padding:.5rem .75rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem;border-bottom:1px solid var(--border);background:var(--bg)">'
            +'<span style="background:'+vCol+';color:#fff;padding:.25rem .625rem;border-radius:4px;font-size:.6875rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase">'+E(g.verdict)+'</span>'
            +(perm?'<a href="'+E(perm)+'" target="_blank" rel="noopener" style="font-size:.625rem;color:var(--accent);text-decoration:none">↗ Instagram</a>':'')
          +'</div>'
          +(embedUrl
            ? '<iframe src="'+E(embedUrl)+'" loading="lazy" allowfullscreen scrolling="no" frameborder="0" style="width:100%;height:480px;border:0;background:#0a0a0a;display:block"></iframe>'
            : '<div style="aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:var(--text-muted);font-size:.75rem">Sem preview disponível</div>')
          +'<div style="padding:.75rem;display:flex;flex-direction:column;gap:.5rem;border-top:1px solid var(--border)">'
            +'<div style="font-size:.75rem;font-weight:700;color:var(--text-primary);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+E(g.ad_name||'—')+'</div>'
            +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.25rem;padding:.5rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">'
              +'<div style="text-align:center"><div style="font-size:1rem;font-weight:800;color:'+ctrCol+'">'+(g.ctr!=null?g.ctr.toFixed(2)+'%':'—')+'</div><div style="font-size:.5625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">CTR</div></div>'
              +'<div style="text-align:center"><div style="font-size:1rem;font-weight:800;color:'+cpcCol+'">'+(g.cpc!=null?'R$'+g.cpc.toFixed(2):'—')+'</div><div style="font-size:.5625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">CPC</div></div>'
              +'<div style="text-align:center"><div style="font-size:1rem;font-weight:800;color:var(--text-primary)">'+(g.spend!=null?'R$'+Math.round(g.spend):'—')+'</div><div style="font-size:.5625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">Spend</div></div>'
            +'</div>'
            +'<div style="font-size:.6875rem;color:var(--text-muted);line-height:1.4">'+E(g.verdict_reason||'')+'</div>'
          +'</div>'
        +'</div>';
      }).join('');
      h += sc('Galeria de Criativos Meta — Top 15 por Spend',
        summaryHead
        +'<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem">'+cards+'</div>'
        +(gs.note?'<p style="margin-top:.75rem;font-size:.6875rem;color:var(--text-muted);font-style:italic">'+E(gs.note)+'</p>':''));
    }

    // Creative testing hypotheses (Meta-only) — posicionado dentro da seção Meta
    if (d.creative_testing_hypotheses?.hypotheses?.length) {
      const ct = d.creative_testing_hypotheses;
      h += sc('Hipóteses de Teste de Criativos',
        ct.hypotheses.map(hy=>
          cd((hy.id?hy.id+' — ':'')+(hy.hypothesis||'—'),
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.75rem">'
            +(hy.angle?'<div><strong>Ângulo:</strong> '+E(hy.angle)+'</div>':'')
            +(hy.format?'<div><strong>Formato:</strong> '+E(hy.format)+'</div>':'')
            +(hy.target_audience?'<div><strong>Público:</strong> '+E(hy.target_audience)+'</div>':'')
            +(hy.cta?'<div><strong>CTA:</strong> '+E(hy.cta)+'</div>':'')
            +'</div>'
            +(hy.hook?'<div style="font-size:.8125rem;margin-top:.375rem"><strong>Hook:</strong> <em>"'+E(hy.hook)+'"</em></div>':'')
            +(hy.body?'<div style="font-size:.75rem;margin-top:.25rem;color:var(--text-secondary)">'+E(hy.body)+'</div>':'')
            +(hy.success_criteria?'<div style="font-size:.75rem;margin-top:.375rem;color:var(--success)"><strong>Sucesso:</strong> '+E(hy.success_criteria)+'</div>':'')
            +'<div style="margin-top:.375rem;display:flex;gap:.375rem">'
            +(hy.testing_budget!=null?tg(BRL(hy.testing_budget),'gray'):'')
            +(hy.testing_duration_days!=null?tg(hy.testing_duration_days+' dias','gray'):'')
            +'</div>',
            'yellow')
        ).join('')
        +(ct.testing_budget_total_week_1!=null?co('Budget total semana 1 de testes: '+BRL(ct.testing_budget_total_week_1)):''));
    }
  }

  // ── CONSOLIDADO & PLANO DE AÇÃO ──
  h += '<div style="margin:2.5rem 0 1rem;padding:1rem 1.25rem;background:linear-gradient(90deg, rgba(34,197,94,0.08), transparent);border-left:4px solid var(--success);border-radius:4px">'
    +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--success);margin-bottom:.125rem">Síntese</div>'
    +'<div style="font-size:1.25rem;font-weight:800;color:var(--text-primary);letter-spacing:-.01em">Consolidado & Plano de Ação</div>'
    +'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.125rem">Problemas priorizados · cenários de realocação · forecast · metas 90 dias</div>'
    +'</div>';

  // Top problems
  if (d.top_problems?.length) {
    h += sc('Top 3 Problemas Críticos', d.top_problems.map(p=>
      cd(p.problem,
        '<p style="margin:0 0 .375rem"><strong>Evidência:</strong> '+E(p.data_evidence)+'</p>'
        +'<p style="margin:0;color:var(--text-secondary)">'+E(p.impact)+'</p>',
        'danger')
    ).join(''));
  }

  // Action plan
  if (d.action_plan?.length) {
    h += sc('Plano de Ação — 30 dias', tb(['#','Ação','Prioridade','Impacto','Prazo'],
      d.action_plan.map(a=>[
        E(a.rank),
        E(a.action),
        tg(a.priority, {P1:'red',P2:'yellow',P3:'gray'}[a.priority]||'gray'),
        '<span style="font-size:.75rem;color:var(--text-muted)">'+E(a.expected_impact)+'</span>',
        E(a.deadline)
      ])));
  }

  // Budget reallocation scenarios
  if (d.budget_reallocation_scenarios) {
    const br = d.budget_reallocation_scenarios;
    const sumAlloc = obj => obj ? Object.values(obj).reduce((s,v)=>s+(typeof v==='number'?v:0),0) : 0;
    const scenTotal = s => (s.total_budget_monthly!=null)?s.total_budget_monthly:(sumAlloc(s.google_allocation)+sumAlloc(s.meta_allocation));
    const scenLeads = s => s.expected_leads_monthly ?? s.projected_leads_month ?? null;
    const scenCpl = s => s.expected_cpl ?? s.projected_cpl ?? null;
    const scenName = s => s.name || s.label || '—';
    const scenGoogle = s => s.google_split!=null?s.google_split:sumAlloc(s.google_allocation);
    const scenMeta = s => s.meta_split!=null?s.meta_split:sumAlloc(s.meta_allocation);

    const renderBs = (s, variant) => s ? cd(scenName(s),
      '<div class="gr gr--2" style="gap:.375rem">'
      +mt(BRL(scenTotal(s)),'Budget/mês','')
      +(scenLeads(s)!=null?mt(N(scenLeads(s)),'Leads/mês',''):'')
      +(scenCpl(s)!=null?mt(BRL(scenCpl(s)),'CPL projetado',''):'')
      +(s.expected_roas!=null?mt(s.expected_roas.toFixed(1)+'x','ROAS',''):
        s.delta_leads?mt(s.delta_leads,'Δ Leads',''):'')
      +'</div>'
      +'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">'
      +(scenGoogle(s)>0?'Google: '+BRL(scenGoogle(s))+' · ':'')
      +(scenMeta(s)>0?'Meta: '+BRL(scenMeta(s)):'')
      +'</div>'
      +(s.effort_weeks!=null||s.confidence?('<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">'
        +(s.effort_weeks!=null?'Esforço: '+s.effort_weeks+' sem · ':'')
        +(s.confidence?'Confiança: '+E(s.confidence):'')
        +'</div>'):'')
      +(s.changes?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Mudanças ('+s.changes.length+')</summary>'
        +'<ul style="font-size:.75rem;margin:.375rem 0 0;padding-left:1rem">'+s.changes.map(c=>'<li style="margin-bottom:.2rem">'+E(c)+'</li>').join('')+'</ul></details>':'')
      +(s.campaigns_structure?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Estrutura ('+s.campaigns_structure.length+' campanhas)</summary>'
        +'<div style="font-size:.75rem;margin-top:.375rem">'+s.campaigns_structure.map(c=>
          '<div style="margin-bottom:.25rem">• <strong>'+E(c.campaign)+'</strong> ('+E(c.platform||'')+') — '+(c.budget_monthly!=null?BRL(c.budget_monthly):'—')+' — <em>'+E(c.objective||'')+'</em></div>'
        ).join('')+'</div></details>':'')
      +(s.prerequisites?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Pré-requisitos ('+s.prerequisites.length+')</summary>'
        +'<ul style="font-size:.75rem;margin:.375rem 0 0;padding-left:1rem">'+s.prerequisites.map(c=>'<li>'+E(c)+'</li>').join('')+'</ul></details>':'')
      +(s.risk_assessment?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">Risco: '+E(s.risk_assessment)+'</div>':''),
      variant) : '';
    // Scenario comparison — metrics as rows, scenarios as columns, inline bars per row
    const scArr = [br.scenario_a_conservative, br.scenario_b_realistic, br.scenario_c_aggressive].filter(Boolean);
    let scChart = '';
    if (scArr.length >= 2) {
      const recommendedIdx = 1; // realista
      const best = scArr.reduce((b,x)=>((scenLeads(x)||0)>(scenLeads(b)||0)?x:b), scArr[0]);
      const scInsightTxt = best
        ? 'Cenário "'+scenName(best).split('—')[0].trim()+'" entrega '+N(scenLeads(best)||0)+' leads/mês a CPL '+BRL(scenCpl(best)||0)+' com budget de '+BRL(scenTotal(best))+'.'
        : '';
      const shortName = s => scenName(s).split('—')[0].trim();
      // Column header
      const colHeader = '<div style="display:grid;grid-template-columns:minmax(140px,20%) repeat('+scArr.length+',1fr);gap:.75rem;align-items:end;padding:0 0 .75rem;border-bottom:2px solid var(--border)">'
        +'<div></div>'
        +scArr.map((s,i)=>{
          const isRec = i===recommendedIdx;
          return '<div style="text-align:center">'
            +(isRec?'<div style="font-size:.6875rem;font-weight:700;color:'+chartColor('green')+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem">★ Recomendado</div>':'<div style="height:1rem"></div>')
            +'<div style="font-size:.875rem;font-weight:700;color:'+(isRec?chartColor('green'):'var(--text)')+'">'+E(shortName(s))+'</div>'
            +'<div style="font-size:.6875rem;color:var(--text-muted);margin-top:.15rem;line-height:1.3">'+E(scenName(s).split('—').slice(1).join('—').trim()||'')+'</div>'
            +'</div>';
        }).join('')+'</div>';
      // Metric rows with inline bars (normalized per row)
      const rows = [
        {label:'Budget/mês', invert:false, values:scArr.map(s=>scenTotal(s)), fmt:v=>BRL(v)},
        {label:'Leads projetados/mês', invert:false, values:scArr.map(s=>scenLeads(s)), fmt:v=>N(v)+' leads'},
        {label:'CPL projetado', invert:true, values:scArr.map(s=>scenCpl(s)), fmt:v=>BRL(v), note:'menor = melhor'},
        {label:'Δ vs atual', invert:false, values:scArr.map(s=>s.delta_leads||null), fmt:v=>v, isText:true},
        {label:'Esforço', invert:true, values:scArr.map(s=>s.effort_weeks), fmt:v=>v+' sem', note:'menor = melhor'},
        {label:'Confiança', invert:false, values:scArr.map(s=>s.confidence||null), fmt:v=>v, isText:true},
      ].filter(r=>r.values.some(v=>v!=null && v!==0));
      const rowsHtml = rows.map(r=>{
        const numVals = r.values.map(v=>typeof v==='number'?v:null);
        const maxV = Math.max(...numVals.filter(v=>v!=null));
        const minV = Math.min(...numVals.filter(v=>v!=null));
        const best = r.invert ? minV : maxV;
        return '<div style="display:grid;grid-template-columns:minmax(140px,20%) repeat('+scArr.length+',1fr);gap:.75rem;align-items:center;padding:.625rem 0;border-bottom:1px solid var(--border)">'
          +'<div><div style="font-size:.75rem;font-weight:600">'+E(r.label)+'</div>'
          +(r.note?'<div style="font-size:.625rem;color:var(--text-muted)">'+E(r.note)+'</div>':'')+'</div>'
          +r.values.map((v,i)=>{
            const isRec = i===recommendedIdx;
            if (v==null) return '<div style="text-align:center;font-size:.75rem;color:var(--text-muted)">—</div>';
            const isBest = typeof v==='number' && v===best && numVals.filter(x=>x===best).length<numVals.filter(x=>x!=null).length;
            const col = isBest?chartColor('green'):(isRec?chartColor('green'):'var(--text)');
            if (r.isText) {
              return '<div style="text-align:center"><div style="font-size:.8125rem;font-weight:'+(isRec?700:600)+';color:'+col+'">'+E(String(r.fmt(v)))+'</div></div>';
            }
            const pct = maxV>0 ? (v/maxV*100) : 0;
            return '<div style="text-align:center">'
              +'<div style="font-size:.8125rem;font-weight:'+(isRec||isBest?700:600)+';color:'+col+';margin-bottom:.2rem">'+E(String(r.fmt(v)))+(isBest?' <span style="font-size:.625rem">★</span>':'')+'</div>'
              +'<div style="height:6px;background:var(--surface);border-radius:2px;overflow:hidden">'
              +'<div style="height:100%;width:'+pct.toFixed(1)+'%;background:'+(isBest?chartColor('green'):isRec?chartColor('green'):CX.muted)+';opacity:'+(isBest||isRec?'.85':'.5')+';border-radius:2px"></div>'
              +'</div></div>';
          }).join('')
          +'</div>';
      }).join('');
      scChart = insight(
        chartTitle('Comparativo de Cenários — Trade-offs Lado a Lado')
        +colHeader+rowsHtml,
        scInsightTxt, 'good');
    }
    h += sc('Cenários de Realocação de Budget',
      (br.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .75rem">'+E(br.description)+'</p>':'')
      +scChart
      +'<div class="gr gr--3">'
      +renderBs(br.scenario_a_conservative,'gray')
      +renderBs(br.scenario_b_realistic,'green')
      +renderBs(br.scenario_c_aggressive,'yellow')
      +'</div>'
      +(br.recommendation?co(br.recommendation):''));
  }

  // Daypart optimization
  if (d.daypart_optimization?.adjustments?.length) {
    h += sc('Otimização por Dia/Hora',
      tb(['Janela','Ajuste de lance','Rationale'],
        d.daypart_optimization.adjustments.map(a=>[
          '<strong>'+E(a.day_time)+'</strong>',
          a.bid_adjustment_pct!=null?tg((a.bid_adjustment_pct>=0?'+':'')+a.bid_adjustment_pct+'%',a.bid_adjustment_pct>=0?'green':'red'):'—',
          '<span style="font-size:.75rem;color:var(--text-secondary)">'+E(a.rationale||'—')+'</span>',
        ])));
  }

  // Forecast sensitivity — REMOVIDO da apresentação (mantido no JSON)
  if (false && d.forecast_sensitivity_analysis) {
    const fs = d.forecast_sensitivity_analysis;
    const bcLeads = bc => bc.leads_monthly ?? bc.leads_month_90d ?? null;
    const bcCpl = bc => bc.cpl ?? bc.cpl_90d_brl ?? null;
    const bcCac = bc => bc.cac ?? bc.cac_90d_brl ?? null;
    let bcHtml = '';
    if (fs.base_case) {
      const bc = fs.base_case;
      bcHtml = (bc.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .5rem"><strong>Caso base:</strong> '+E(bc.description)+'</p>':'')
        +'<div class="gr gr--4">'
        +(bcLeads(bc)!=null?mt(N(bcLeads(bc)),'Leads/mês',''):'')
        +(bcCpl(bc)!=null?mt(BRL(bcCpl(bc)),'CPL',''):'')
        +(bcCac(bc)!=null?mt(BRL(bcCac(bc)),'CAC','green'):'')
        +(bc.revenue_monthly!=null?mt(BRL(bc.revenue_monthly),'Receita/mês','green'):'')
        +(bc.roas!=null?mt(bc.roas.toFixed(1)+'x','ROAS','green'):'')
        +'</div>';
    }
    let varHtml = '';
    let sensChart = '';
    if (fs.variations?.length) {
      // Support both new (delta_vs_base_pct) and old field shapes
      const parsePct = s => {
        if (s==null) return null;
        if (typeof s === 'number') return s;
        const m = String(s).match(/([+-]?\d+(?:\.\d+)?)\s*%/);
        return m ? parseFloat(m[1]) : null;
      };
      const getPct = v => (typeof v.delta_vs_base_pct === 'number' ? v.delta_vs_base_pct
        : parsePct(v.impact_on_leads) ?? parsePct(v.impact_on_revenue));
      const getName = v => v.scenario || v.scenario_name || '—';
      const getLeads = v => v.impact_on_leads_month_90d ?? v.impact_on_leads ?? null;
      const getCpl = v => v.impact_on_cpl_brl ?? v.impact_on_cpl ?? null;

      const baseLeads = fs.base_case ? bcLeads(fs.base_case) : null;
      const sorted = [...fs.variations].sort((a,b)=>(getPct(a)??0)-(getPct(b)??0));
      const maxAbs = Math.max(...sorted.map(v=>Math.abs(getPct(v)??0)), 1);
      if (sorted.length) {
        const worst = sorted[0];
        const worstPct = getPct(worst) ?? 0;
        const sensInsight = 'Cada linha é um cenário "e se" de risco aplicado sobre o caso base. Maior ameaça: "'
          +getName(worst).split('(')[0].trim()+'" derruba '+Math.abs(worstPct).toFixed(0)+'% dos leads. Monitore o gatilho e acione mitigação antes do impacto se materializar.';
        const header = '<div style="display:grid;grid-template-columns:minmax(180px,32%) minmax(90px,12%) 1fr minmax(70px,10%);gap:.75rem;align-items:end;padding:0 0 .5rem;border-bottom:1px solid var(--border);font-size:.6875rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600">'
          +'<div>Cenário de risco</div>'
          +'<div style="text-align:right">Leads/mês</div>'
          +'<div>Perda vs base'+(baseLeads!=null?' (base: '+N(baseLeads)+' leads)':'')+'</div>'
          +'<div style="text-align:right">Δ %</div></div>';
        const rows = sorted.map(v=>{
          const pct = getPct(v) ?? 0;
          const leads = getLeads(v);
          const col = pct<=-25?chartColor('red'):pct<=-10?chartColor('yellow'):chartColor('gray');
          const barPct = Math.min(100, (Math.abs(pct)/maxAbs*100));
          return '<div style="display:grid;grid-template-columns:minmax(180px,32%) minmax(90px,12%) 1fr minmax(70px,10%);gap:.75rem;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">'
            +'<div style="font-size:.75rem;font-weight:600;line-height:1.35">'+E(getName(v))+'</div>'
            +'<div style="text-align:right"><div style="font-size:.8125rem;font-weight:700;color:'+col+'">'+(leads!=null?N(leads):'—')+'</div>'
            +(leads!=null&&baseLeads!=null?'<div style="font-size:.625rem;color:var(--text-muted)">'+(leads-baseLeads>0?'+':'')+N(leads-baseLeads)+' vs base</div>':'')+'</div>'
            +'<div style="position:relative;height:14px;background:var(--surface);border-radius:2px;overflow:hidden">'
            +'<div style="position:absolute;left:0;top:0;height:100%;width:'+barPct.toFixed(1)+'%;background:'+col+';opacity:.8;border-radius:2px"></div>'
            +'</div>'
            +'<div style="text-align:right;font-size:.8125rem;font-weight:700;color:'+col+'">'+(pct>=0?'+':'')+pct.toFixed(0)+'%</div>'
            +'</div>';
        }).join('');
        const legend = '<div style="display:flex;gap:1.25rem;font-size:.6875rem;margin-top:.75rem;flex-wrap:wrap;color:var(--text-muted)">'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('red')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Crítico (≤-25%)</span>'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('yellow')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Moderado (-10% a -25%)</span>'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('gray')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Leve (&gt;-10%)</span>'
          +'<span>· ordenado do maior ao menor impacto</span></div>';
        sensChart = insight(
          chartTitle('O que acontece se cada risco se materializar')
          +header+rows+legend,
          sensInsight, worstPct<-15?'bad':'warn');
      }
      // Detailed table: scenario, cause, leads, cpl, delta, mitigation
      varHtml = '<div style="margin-top:.5rem;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Cenários detalhados</div>'
        +fs.variations.map(v => {
          const pct = getPct(v);
          const toneColor = (pct??0)<-15?'danger':(pct??0)<0?'yellow':'gray';
          return cd(getName(v),
            (v.cause?'<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.375rem"><strong>Causa:</strong> '+E(v.cause)+'</div>':'')
            +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.375rem">'
            +(getLeads(v)!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">Leads/mês</div><div style="font-size:.875rem;font-weight:700">'+N(getLeads(v))+'</div></div>':'')
            +(getCpl(v)!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">CPL</div><div style="font-size:.875rem;font-weight:700">'+BRL(getCpl(v))+'</div></div>':'')
            +(pct!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">Δ vs base</div><div style="font-size:.875rem;font-weight:700;color:var(--'+(pct<0?'danger':'success')+')">'+(pct>=0?'+':'')+pct.toFixed(0)+'%</div></div>':'')
            +'</div>'
            +(v.impact_on_lifetime_value?'<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.25rem">LTV: '+E(v.impact_on_lifetime_value)+'</div>':'')
            +(v.mitigation?'<div style="font-size:.75rem;padding:.375rem .5rem;background:var(--surface);border-left:2px solid var(--success);border-radius:3px"><strong style="color:var(--success)">Mitigação:</strong> '+E(v.mitigation)+'</div>':''),
            toneColor);
        }).join('');
    }
    h += sc('Análise de Sensibilidade do Forecast',
      (fs.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .75rem">'+E(fs.description)+'</p>':'')
      +bcHtml+varHtml);
  }

  // 90-day goal
  const g90 = d.realistic_goal_90d || d.realistic_goal;
  if (g90) {
    h += sc('Meta Realista — 90 Dias',
      '<div class="gr gr--4">'
      +(g90.target_cpl!=null?mt(BRL(g90.target_cpl),'CPL Alvo','green'):'')
      +(g90.target_cac!=null?mt(BRL(g90.target_cac),'CAC Alvo','green'):'')
      +(g90.target_leads_month!=null?mt(N(g90.target_leads_month),'Leads/mês Alvo','green'):'')
      +(g90.target_agendamentos_month!=null?mt(N(g90.target_agendamentos_month),'Agendamentos Alvo','green'):'')
      +'</div>'
      +(g90.premissas?.length?cd('Premissas',g90.premissas.map(p=>'<div style="font-size:.8125rem;margin-bottom:.2rem">&#9675; '+E(p)+'</div>').join('')):'')
    );
  }

  h += renderKeyInsight(d.key_insight, { title: 'Ponto de Alavancagem — Realocação + Hipótese Principal' });
  h += renderHonestyAlert(d.honesty_alert);

  return h;
},

'ee-s2-diagnostico-criativos'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);
  const counts = d.counts || d.summary_counts || {};
  if (d.total_creatives_analyzed || d.average_score) {
    h += '<div class="gr gr--3">'
      +mt(d.total_creatives_analyzed||'—','Criativos Analisados','')
      +mt(d.average_score!=null?(d.average_score+'/25'):'—','Score Médio',d.average_score>=20?'green':d.average_score>=13?'yellow':'red')
      +(counts.keep_count!=null?mt(counts.keep_count,'Manter','green'):'')
      +'</div>';
  }
  if (d.creative_matrix?.length) {
    const vc = {manter:'green',otimizar:'yellow',eliminar:'danger'};
    // Donut de veredictos
    const verdictCount = {};
    d.creative_matrix.forEach(c => { verdictCount[c.verdict] = (verdictCount[c.verdict]||0) + 1; });
    const verdictLabels = {manter:'Manter',otimizar:'Otimizar',eliminar:'Eliminar'};
    const verdictTone = {manter:'green',otimizar:'yellow',eliminar:'red'};
    const donutData = Object.keys(verdictCount).map(k=>({
      label: verdictLabels[k]||k, value: verdictCount[k], tone: verdictTone[k]||'gray',
    }));
    const total = d.creative_matrix.length;
    const elimPct = Math.round(((verdictCount.eliminar||0)/total)*100);
    const manterPct = Math.round(((verdictCount.manter||0)/total)*100);
    const verdictInsight = elimPct >= 40
      ? elimPct+'% dos criativos precisam ser eliminados — revisar briefing de produção antes de nova leva.'
      : manterPct >= 60
        ? manterPct+'% dos criativos estão saudáveis — base sólida para escalar.'
        : 'Mix equilibrado: '+manterPct+'% manter, '+elimPct+'% eliminar — priorizar otimização dos intermediários.';
    h += sc('Veredicto do Pack Atual',
      insight(chartDonut(donutData, {title:'Distribuição de Veredictos'}),
        verdictInsight, elimPct>=40?'bad':manterPct>=60?'good':'warn'));
    h += sc('Matriz de Avaliação', tb(['#','Tipo','Hook','Clareza','ICP','CTA','Visual','Total','Veredicto'],
      d.creative_matrix.map(c=>[E(c.number),E(c.type),E(c.hook_score),E(c.clarity_score),E(c.icp_coherence_score),E(c.cta_score),E(c.visual_score),
        '<strong>'+E(c.total_score)+'/25</strong>',tg(c.verdict,vc[c.verdict])])));
  }
  if (d.patterns_identified?.length) {
    h += sc('Padrões Identificados', d.patterns_identified.map(p=>cd(p.pattern,E(p.example),'yellow')).join(''));
  }
  if (d.production_briefing) {
    const b = d.production_briefing;
    h += sc('Briefing de Produção', cd('Direção de Hook',E(b.hook_direction),'red')
      +'<p><strong>Formato prioritário:</strong> '+E(b.priority_format)+'</p>'
      +(b.visual_elements?'<p><strong>Incluir:</strong> '+b.visual_elements.map(v=>E(v)).join(', ')+'</p>':'')
      +(b.avoid_elements?'<p><strong>Evitar:</strong> '+b.avoid_elements.map(v=>E(v)).join(', ')+'</p>':''));
  }
  return h;
},

'ee-s2-diagnostico-organico-ig'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);

  const period = d.period || {};
  const client = d.client_account || {};
  const competitors = d.competitor_accounts || [];
  const allAccounts = [client].concat(competitors);

  // Cabecalho: periodo + contas
  h += sc('Período e contas analisadas',
    '<div class="gr gr--3">'
    +mt(period.days?period.days+' dias':'—','Janela de análise','')
    +mt(N(client.followers_count),'Seguidores — '+E(client.username||''),'green')
    +mt(N(client.posts_90d),'Posts do cliente no período','')
    +'</div>'
    +'<p style="font-size:.8125rem;margin-top:.5rem;color:var(--muted)">Período: '+E(period.start||'—')+' a '+E(period.end||'—')+'. Fonte: Instagram Graph API (business_discovery). Engagement proxy = (likes + 3×comentários) / seguidores × 100.</p>'
  );

  // Cards das contas (client + competitors)
  const accountCard = (a, role) => {
    const toneRole = role==='client' ? 'green' : 'yellow';
    const tagRole = role==='client' ? 'CLIENTE' : 'CONCORRENTE';
    const pic = a.profile_picture_url ? '<img src="'+E(a.profile_picture_url)+'" alt="" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex:0 0 48px">' : '';
    return '<div class="cd cd--'+toneRole+'" style="min-width:260px">'
      +'<div class="cd__title" style="display:flex;align-items:center;gap:.6rem">'
      +pic
      +'<div><div>@'+E(a.username||'')+'</div><div style="font-size:.75rem;color:var(--muted);font-weight:500">'+E(a.name||'')+'</div></div>'
      +'<span class="tg tg--'+toneRole+'" style="margin-left:auto">'+tagRole+'</span>'
      +'</div>'
      +'<div class="cd__body" style="font-size:.8125rem">'
      +'<div>Seguidores: <strong>'+N(a.followers_count)+'</strong></div>'
      +'<div>Posts 90d: <strong>'+N(a.posts_90d)+'</strong></div>'
      +(a.website?'<div style="word-break:break-all">Site: '+E(a.website)+'</div>':'')
      +(a.biography?'<div style="margin-top:.3rem;font-size:.75rem;color:var(--muted);max-height:60px;overflow:hidden">'+E(a.biography)+'</div>':'')
      +'</div></div>';
  };
  h += sc('Contas comparadas',
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.75rem">'
    +accountCard(client,'client')
    +competitors.map(c=>accountCard(c,'competitor')).join('')
    +'</div>'
  );

  // Distribuicao por formato
  const fd = d.format_distribution || {};
  if (fd.by_account?.length) {
    const rows = fd.by_account.map(a=>{
      const c = a.counts||{};
      const total = (c.FEED_IMAGE||0)+(c.CAROUSEL||0)+(c.REELS||0)+(c.VIDEO||0);
      const pct = v => total ? Math.round(((v||0)/total)*100)+'%' : '0%';
      return [
        '@'+E(a.username),
        (c.FEED_IMAGE||0)+' ('+pct(c.FEED_IMAGE)+')',
        (c.CAROUSEL||0)+' ('+pct(c.CAROUSEL)+')',
        (c.REELS||0)+' ('+pct(c.REELS)+')',
        (c.VIDEO||0)+' ('+pct(c.VIDEO)+')',
        '<strong>'+total+'</strong>',
      ];
    });
    h += sc('Distribuição por formato',
      tb(['Conta','Feed (imagem)','Carrossel','Reels','Vídeo','Total'], rows)
      +(fd.insight?cd('Leitura comparativa', E(fd.insight),'yellow'):'')
    );
  }

  // Cadencia
  const cad = d.cadence || {};
  if (cad.by_account?.length) {
    const rows = cad.by_account.map(a=>[
      '@'+E(a.username),
      (a.posts_per_week!=null?a.posts_per_week+'/semana':'—'),
      E(a.preferred_weekday||'—'),
      E(a.preferred_hour||'—'),
    ]);
    h += sc('Cadência', tb(['Conta','Volume','Dia preferido','Horário preferido'], rows)
      +(cad.insight?cd('Leitura comparativa', E(cad.insight),'yellow'):''));
  }

  // Engagement benchmark
  const eng = d.engagement_benchmark || {};
  if (eng.by_account?.length) {
    const rows = eng.by_account.map(a=>[
      '@'+E(a.username),
      N(a.avg_likes),
      N(a.avg_comments),
      (a.avg_engagement_proxy!=null?a.avg_engagement_proxy.toFixed(3)+'%':'—'),
      E(a.best_format_by_engagement||'—'),
    ]);
    h += sc('Benchmark de engajamento', tb(['Conta','Likes médios','Comentários médios','Eng. proxy','Melhor formato'], rows)
      +(eng.insight?cd('Leitura comparativa', E(eng.insight),'yellow'):''));
  }

  // Helper para renderizar um post com embed
  const postCard = (p, variant) => {
    const embed = p.embed_url || (p.permalink ? p.permalink.replace(/\/$/,'')+'/embed/' : '');
    const tone = variant==='bottom' ? 'red' : (p.gap_para_cliente ? 'yellow' : 'green');
    const badge = variant==='bottom' ? 'BOTTOM' : (p.gap_para_cliente?'GAP':'TOP');
    const ts = p.timestamp ? new Date(p.timestamp).toLocaleDateString('pt-BR') : '';
    return '<div class="cd cd--'+tone+'" style="display:flex;flex-direction:column;min-width:280px;max-width:360px">'
      +'<div class="cd__title" style="display:flex;align-items:center;gap:.5rem;justify-content:space-between">'
      +'<span>@'+E(p.username||'')+'</span>'
      +'<span class="tg tg--'+tone+'">'+badge+' · '+E(p.format||'')+'</span>'
      +'</div>'
      +(embed?'<div style="margin:.5rem 0;background:#000;border-radius:8px;overflow:hidden">'
        +'<iframe src="'+E(embed)+'" loading="lazy" allowtransparency="true" frameborder="0" scrolling="no" allowfullscreen="true" '
        +'style="width:100%;height:520px;border:0;display:block;background:#fff"></iframe></div>':'')
      +'<div class="cd__body" style="font-size:.8125rem">'
      +'<div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:.3rem;color:var(--muted)">'
      +'<span>❤ '+N(p.like_count||0)+'</span>'
      +'<span>💬 '+N(p.comments_count||0)+'</span>'
      +'<span>⚡ '+(p.engagement_proxy!=null?p.engagement_proxy.toFixed(3)+'%':'—')+'</span>'
      +(ts?'<span>'+E(ts)+'</span>':'')
      +'</div>'
      +(p.diagnosis?'<div style="border-left:3px solid var(--'+(variant==='bottom'?'danger':'success')+');padding-left:.5rem;margin-top:.4rem"><strong style="font-size:.75rem;text-transform:uppercase;color:var(--muted)">Diagnóstico</strong><div>'+E(p.diagnosis)+'</div></div>':'')
      +(p.permalink?'<div style="margin-top:.4rem"><a href="'+E(p.permalink)+'" target="_blank" rel="noopener" style="font-size:.75rem">Ver no Instagram ↗</a></div>':'')
      +'</div></div>';
  };

  // Top posts — agrupados por conta
  if (d.top_posts?.length) {
    const byAcc = {};
    d.top_posts.forEach(p => { (byAcc[p.username] = byAcc[p.username] || []).push(p); });
    const ordered = [client.username].concat(competitors.map(c=>c.username)).filter(Boolean);
    let html = '';
    ordered.forEach(u => {
      if (!byAcc[u]) return;
      const isClient = u === client.username;
      html += '<h4 style="margin:1rem 0 .5rem 0;font-size:.875rem;color:var(--muted)">@'+E(u)+(isClient?' <span class="tg tg--green">cliente</span>':'')+'</h4>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.75rem">'
        +byAcc[u].map(p=>postCard(p,'top')).join('')
        +'</div>';
    });
    h += sc('Top posts por engajamento (últimos 90 dias)', html);
  }

  // Bottom posts — apenas cliente
  if (d.bottom_posts?.length) {
    h += sc('Posts do cliente com menor engajamento',
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.75rem">'
      +d.bottom_posts.map(p=>postCard(p,'bottom')).join('')
      +'</div>');
  }

  // Padroes que faltam no cliente
  if (d.competitor_patterns_missing?.length) {
    h += sc('Padrões que funcionam nos concorrentes e o cliente não usa',
      d.competitor_patterns_missing.map((p,i)=>cd(
        '#'+(i+1)+' · '+E(p.pattern)+' (visto em '+N(p.seen_in_count||0)+' posts)',
        '<div style="font-size:.8125rem">'
        +(p.seen_in_competitors?.length?'<div><strong>Concorrentes:</strong> '+p.seen_in_competitors.map(c=>'@'+E(c)).join(', ')+'</div>':'')
        +'<div style="margin-top:.3rem"><strong>Por que funciona:</strong> '+E(p.why_works||'')+'</div>'
        +'<div style="margin-top:.3rem"><strong>Como aplicar:</strong> '+E(p.how_to_apply||'')+'</div>'
        +(p.example_permalinks?.length?'<div style="margin-top:.3rem;font-size:.75rem">Exemplos: '+p.example_permalinks.map(l=>'<a href="'+E(l)+'" target="_blank" rel="noopener">↗</a>').join(' · ')+'</div>':'')
        +'</div>',
        'yellow'
      )).join('')
    );
  }

  // Padroes vencedores do cliente
  if (d.client_winning_patterns?.length) {
    h += sc('Padrões vencedores do cliente — amplificar',
      d.client_winning_patterns.map((p,i)=>cd(
        '#'+(i+1)+' · '+E(p.pattern)+' (visto em '+N(p.seen_in_count||0)+' posts)',
        '<div style="font-size:.8125rem"><strong>Recomendação:</strong> '+E(p.recommendation||'')+'</div>',
        'green'
      )).join('')
    );
  }

  // Compliance
  const comp = d.instagram_compliance;
  if (comp && (comp.aspect_ratio_issues_count != null || comp.notes)) {
    h += sc('Conformidade técnica (Instagram)',
      '<div class="gr gr--2">'
      +(comp.aspect_ratio_issues_count!=null?mt(comp.aspect_ratio_issues_count,'Posts com aspect ratio fora do padrão',comp.aspect_ratio_issues_count>0?'red':'green'):'')
      +'</div>'
      +(comp.notes?cd('Notas',E(comp.notes),'yellow'):'')
    );
  }

  // Proximas acoes
  if (d.next_actions?.length) {
    const iTone = {alto:'green',medio:'yellow',baixo:'gray'};
    const eTone = {baixo:'green',medio:'yellow',alto:'red'};
    const rows = d.next_actions
      .slice()
      .sort((a,b)=>(a.priority||99)-(b.priority||99))
      .map(a=>[
        '#'+E(a.priority||''),
        E(a.action),
        tg(a.impact||'—',iTone[a.impact]||'gray'),
        tg(a.effort||'—',eTone[a.effort]||'gray'),
      ]);
    h += sc('Próximas ações priorizadas', tb(['Prio','Ação','Impacto','Esforço'], rows));
  }

  return h;
},

'ee-s2-diagnostico-cro'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);

  const scoreTone = v => v==null?'gray':v>=90?'green':v>=50?'yellow':'red';
  const cwvTone = (val, good, ni) => val==null?'gray':val<=good?'green':val<=ni?'yellow':'red';
  const cwvLabel = (val, good, ni) => val==null?'—':val<=good?'Bom':val<=ni?'A melhorar':'Ruim';
  const fmtMs = v => v==null?'—':v>=1000?(v/1000).toFixed(2)+'s':Math.round(v)+'ms';
  const fmtNum3 = v => v==null?'—':Number(v).toFixed(3);

  // Score bar 0-X: faixa gradient (vermelho→amarelo→verde) + marcador no score + label grande
  const scoreBar = (value, max, opts) => {
    opts = opts || {};
    if (value == null) return '';
    const pct = Math.max(0, Math.min(100, (value/max)*100));
    const color = value>=max*0.7 ? 'var(--success)' : value>=max*0.4 ? 'var(--warning)' : 'var(--danger)';
    return '<div class="scbar">'
      +'<div class="scbar__head">'
      +(opts.title?'<div class="scbar__title">'+E(opts.title)+'</div>':'')
      +'<div class="scbar__value" style="color:'+color+'">'+value+'<span class="scbar__max">/'+max+'</span></div>'
      +'</div>'
      +'<div class="scbar__track"><div class="scbar__fill" style="width:'+pct.toFixed(1)+'%;background:'+color+'"></div></div>'
      +'<div class="scbar__scale"><span>0</span><span style="color:var(--danger)">Ruim</span><span style="color:var(--warning)">Médio</span><span style="color:var(--success)">Bom</span><span>'+max+'</span></div>'
      +(opts.caption?'<div class="scbar__caption">'+E(opts.caption)+'</div>':'')
      +'</div>';
  };

  // Screenshots mobile + desktop lado a lado (do PSI final-screenshot)
  const audit = d.technical_audit || {};
  const pa = audit.pagespeed || {};
  const ss = audit.screenshots || {};
  if (ss.mobile || ss.desktop) {
    h += sc('Como o Google vê a página (screenshot automático)',
      '<div class="ssgrid">'
      +(ss.mobile?'<figure class="ssfig"><figcaption>Mobile (Moto G Power)</figcaption><div class="ssfig__frame ssfig__frame--mobile"><img src="'+E(ss.mobile)+'" alt="Screenshot mobile"></div></figure>':'')
      +(ss.desktop?'<figure class="ssfig"><figcaption>Desktop (1350×940)</figcaption><div class="ssfig__frame ssfig__frame--desktop"><img src="'+E(ss.desktop)+'" alt="Screenshot desktop"></div></figure>':'')
      +'</div>');
  }

  if (d.technical_audit?.pagespeed) {
    const ps = d.technical_audit.pagespeed;
    const ms = ps.mobile_scores||{}, ds = ps.desktop_scores||{};
    const ml = ps.mobile_cwv_lab||{}, dl = ps.desktop_cwv_lab||{};
    const mf = ps.mobile_cwv_field, df = ps.desktop_cwv_field;

    // Scores (PSI 4 categorias x 2 dispositivos)
    const scoreRows = [
      ['Performance', ms.performance??'—', ds.performance??'—'],
      ['Acessibilidade', ms.accessibility??'—', ds.accessibility??'—'],
      ['Best Practices', ms.best_practices??'—', ds.best_practices??'—'],
      ['SEO', ms.seo??'—', ds.seo??'—'],
    ];
    const rowsHtml = scoreRows.map(r=>[r[0],
      tg(r[1],scoreTone(r[1]==='—'?null:r[1])),
      tg(r[2],scoreTone(r[2]==='—'?null:r[2]))]);
    h += sc('PageSpeed Insights — Scores', tb(['Categoria','Mobile','Desktop'], rowsHtml));

    // CWV lab
    const cwvRows = [
      ['LCP (Largest Contentful Paint)', fmtMs(ml.lcp_ms), fmtMs(dl.lcp_ms), tg(cwvLabel(ml.lcp_ms,2500,4000),cwvTone(ml.lcp_ms,2500,4000))],
      ['FCP (First Contentful Paint)', fmtMs(ml.fcp_ms), fmtMs(dl.fcp_ms), tg(cwvLabel(ml.fcp_ms,1800,3000),cwvTone(ml.fcp_ms,1800,3000))],
      ['TBT (Total Blocking Time)', fmtMs(ml.tbt_ms), fmtMs(dl.tbt_ms), tg(cwvLabel(ml.tbt_ms,200,600),cwvTone(ml.tbt_ms,200,600))],
      ['CLS (Cumulative Layout Shift)', fmtNum3(ml.cls), fmtNum3(dl.cls), tg(cwvLabel(ml.cls,0.1,0.25),cwvTone(ml.cls,0.1,0.25))],
      ['Speed Index', fmtMs(ml.speed_index_ms), fmtMs(dl.speed_index_ms), tg(cwvLabel(ml.speed_index_ms,3400,5800),cwvTone(ml.speed_index_ms,3400,5800))],
      ['TTFB (Time to First Byte)', fmtMs(ml.ttfb_ms), fmtMs(dl.ttfb_ms), tg(cwvLabel(ml.ttfb_ms,800,1800),cwvTone(ml.ttfb_ms,800,1800))],
    ];
    h += sc('Core Web Vitals (Lab)', tb(['Métrica','Mobile','Desktop','Status Mobile'], cwvRows));

    // CrUX field (opcional)
    if (mf || df) {
      const fieldRow = (k,lbl,unit) => {
        const m = mf?.[k], de = df?.[k];
        const mv = m?.percentile!=null?(unit==='ms'?fmtMs(m.percentile):Number(m.percentile).toFixed(3)):'—';
        const dv = de?.percentile!=null?(unit==='ms'?fmtMs(de.percentile):Number(de.percentile).toFixed(3)):'—';
        const cat = m?.category||'—';
        const catTone = cat==='FAST'||cat==='good'?'green':cat==='AVERAGE'||cat==='needs-improvement'?'yellow':cat==='SLOW'||cat==='poor'?'red':'gray';
        return [lbl, mv, dv, tg(cat,catTone)];
      };
      const fieldRows = [
        fieldRow('lcp','LCP','ms'),
        fieldRow('inp','INP','ms'),
        fieldRow('cls','CLS',null),
        fieldRow('fcp','FCP','ms'),
      ];
      h += sc('Core Web Vitals — Field Data (usuários reais, CrUX)',
        tb(['Métrica','Mobile (p75)','Desktop (p75)','Status Mobile'], fieldRows));
    }

    // Opportunities
    const opps = ps.mobile_top_opportunities||[];
    if (opps.length) {
      const oppRows = opps.slice(0,8).map(o=>[
        E(o.title||o.id),
        o.savings_ms!=null?fmtMs(o.savings_ms):'—',
        o.savings_bytes!=null?Math.round(o.savings_bytes/1024)+' KB':'—',
        tg(o.score!=null?Math.round(o.score*100):'—',scoreTone(o.score!=null?Math.round(o.score*100):null))
      ]);
      h += sc('Top Oportunidades (Mobile)', tb(['Oportunidade','Economia (tempo)','Economia (peso)','Score'], oppRows));
    }
  }

  if (d.onpage_seo) {
    const o = d.onpage_seo, m = o.mobile||{}, ds = o.desktop||{};
    // Key fields comparison
    const seoRows = [
      ['Title', E(m.title||'—'), m.title_length!=null?m.title_length+' chars':'—', tg((m.title_length>=30&&m.title_length<=70)?'OK':(m.title_length?'Fora ideal':'Ausente'),(m.title_length>=30&&m.title_length<=70)?'green':'yellow')],
      ['Meta Description', E((m.meta_description||'').substring(0,100)+((m.meta_description||'').length>100?'…':'')), m.meta_description_length!=null?m.meta_description_length+' chars':'—', tg((m.meta_description_length>=120&&m.meta_description_length<=160)?'OK':(m.meta_description_length?'Fora ideal':'Ausente'),(m.meta_description_length>=120&&m.meta_description_length<=160)?'green':m.meta_description_length?'yellow':'red')],
      ['Canonical', E(m.canonical||'—'), '—', tg(m.canonical?'OK':'Ausente',m.canonical?'green':'red')],
      ['Lang', E(m.lang||'—'), '—', tg(m.lang?'OK':'Ausente',m.lang?'green':'red')],
      ['Viewport', E(m.viewport||'—'), '—', tg(m.viewport?'OK':'Ausente',m.viewport?'green':'red')],
      ['Favicon', E(m.favicon||'—'), '—', tg(m.favicon?'OK':'Ausente',m.favicon?'green':'red')],
    ];
    h += sc('On-page SEO', tb(['Elemento','Valor (Mobile)','Tamanho','Status'], seoRows));

    // Structured data
    const schemas = m.schema_types||[];
    const ogCount = m.og?Object.keys(m.og).length:0;
    const twCount = m.twitter?Object.keys(m.twitter).length:0;
    h += '<div class="gr gr--3" style="margin-top:.75rem">'
      +mt(schemas.length||'0','Schema.org (JSON-LD)',schemas.length?'green':'yellow')
      +mt(ogCount,'Open Graph tags',ogCount>=4?'green':ogCount?'yellow':'red')
      +mt(twCount,'Twitter Card tags',twCount>=3?'green':twCount?'yellow':'red')
      +'</div>';
    if (schemas.length) h += co('Schemas detectados: '+schemas.map(E).join(', '));

    // Estrutura + acessibilidade
    const imgsTotal = m.images_total||0, imgsNoAlt = m.images_without_alt||0;
    const altPct = imgsTotal?Math.round((imgsTotal-imgsNoAlt)/imgsTotal*100):null;
    h += '<div class="gr gr--4" style="margin-top:.75rem">'
      +mt(m.h1_count??'—','H1 (qtd)',m.h1_count===1?'green':'red')
      +mt(m.h2_count??'—','H2 (qtd)','')
      +mt(imgsTotal?(imgsTotal-imgsNoAlt)+'/'+imgsTotal:'—','Imagens com alt',altPct===null?'gray':altPct>=80?'green':altPct>=50?'yellow':'red')
      +mt(m.response_time_ms!=null?fmtMs(m.response_time_ms):'—','Response time',m.response_time_ms==null?'gray':m.response_time_ms<=500?'green':m.response_time_ms<=1500?'yellow':'red')
      +'</div>';
    h += '<div class="gr gr--3" style="margin-top:.5rem">'
      +mt(m.links_internal??'—','Links internos','')
      +mt(m.links_external??'—','Links externos','')
      +mt(m.html_size_kb!=null?Math.round(m.html_size_kb)+' KB':'—','HTML size',m.html_size_kb==null?'gray':m.html_size_kb<=150?'green':m.html_size_kb<=500?'yellow':'red')
      +'</div>';

    if (o.divergences?.length) {
      h += '<div class="co"><strong>Divergências mobile vs desktop:</strong><ul style="margin:.5rem 0 0 1.25rem">'
        +o.divergences.map(x=>'<li>'+E(x)+'</li>').join('')+'</ul></div>';
    }
  }

  if (d.security_headers) {
    const s = d.security_headers;
    const sh = (val,label) => mt(val?'✓':'✗',label,val?'green':'red');
    h += sc('Segurança (Headers HTTP)',
      '<div class="gr gr--4">'
      +sh(s.https,'HTTPS')
      +sh(s.hsts,'HSTS')
      +sh(s.csp,'CSP')
      +sh(s.x_frame_options,'X-Frame-Options')
      +'</div>'
      +'<div class="gr gr--3" style="margin-top:.5rem">'
      +sh(s.x_content_type_options,'X-Content-Type-Options')
      +sh(s.referrer_policy,'Referrer-Policy')
      +sh(s.permissions_policy,'Permissions-Policy')
      +'</div>'
      +(s.score!=null?('<div style="margin-top:.75rem">'+insight(scoreBar(s.score,10,{title:'Security Score',caption:'Referência: 7+/10 = headers adequados para site transacional'}),
        s.score>=7?'Headers adequados para site institucional/transacional.':
        s.score>=4?'Headers básicos ok, mas gaps importantes — especialmente se o site lida com dados sensíveis.':
        'CRÍTICO: headers ausentes expõem a site a ataques clickjacking, MITM, injeção. Configurar no servidor/CDN é baixo custo e alto ganho.',
        s.score>=7?'good':s.score>=4?'warn':'bad')+'</div>'):'')
      +(s.issues?.length?'<div class="co"><strong>Issues:</strong><ul style="margin:.5rem 0 0 1.25rem">'+s.issues.map(x=>'<li>'+E(x)+'</li>').join('')+'</ul></div>':''));
  }

  if (d.technical_diagnosis) {
    const t = d.technical_diagnosis;
    h += '<div class="gr gr--4">'
      +mt(t.pagespeed_mobile??'—','PageSpeed Mobile',t.pagespeed_mobile>=80?'green':t.pagespeed_mobile>=50?'yellow':'red')
      +mt(t.pagespeed_desktop??'—','PageSpeed Desktop',t.pagespeed_desktop>=80?'green':t.pagespeed_desktop>=50?'yellow':'red')
      +mt(t.lcp!=null?t.lcp+'s':'—','LCP',t.lcp<=2.5?'green':t.lcp<=4?'yellow':'red')
      +mt(d.current_conversion_rate!=null?PCT(d.current_conversion_rate):'—','Conv. Atual','')
      +'</div>';
    if (t.critical_issues?.length) h += sc('Problemas Críticos de Velocidade',
      '<ul class="cl">'+t.critical_issues.map(x=>'<li><span class="cl__icon cl__icon--alert">!</span><span>'+E(x)+'</span></li>').join('')+'</ul>');
    if (t.estimated_conversion_loss) h += '<div class="co"><strong>Impacto estimado em conversão:</strong> '+E(t.estimated_conversion_loss)+'</div>';
  }
  // ========== TRACKING STACK ==========
  if (d.tracking_stack) {
    const ts = d.tracking_stack;
    const tools = ts.tools_detected || {};
    const ids = ts.ids_found || {};
    const cats = ts.categories_summary || {};

    // Sumario por categoria
    const catLabels = {tracking:'Tag Managers',analytics:'Analytics',ads:'Ads/Pixels',heatmap:'Heatmap/Sessão',chat:'Chat/CRM',cms:'CMS',ecommerce:'E-commerce',framework:'Framework',lp_builder:'LP Builder',cmp:'CMP (Consent)',hosting:'Hosting/CDN'};
    const catOrder = ['tracking','analytics','ads','cmp','heatmap','chat','cms','ecommerce','framework','lp_builder','hosting'];
    const catRows = catOrder.filter(c=>cats[c]?.length).map(c=>[
      E(catLabels[c]||c),
      (cats[c]||[]).map(n=>'<span class="tg tg--gray" style="margin:.1rem .2rem .1rem 0">'+E(n)+'</span>').join('')
    ]);
    h += sc('Stack de Tagueamento Detectado',
      '<div class="gr gr--3" style="margin-bottom:.75rem">'
      +mt(ts.total_tools||0,'Ferramentas',ts.total_tools?'green':'red')
      +mt((ids.gtm||[]).length||'0','Containers GTM',(ids.gtm||[]).length?'green':'yellow')
      +mt((ids.ga4||[]).length + (ids.meta_pixel||[]).length || '0','GA4 + Pixel',((ids.ga4||[]).length||(ids.meta_pixel||[]).length)?'green':'red')
      +'</div>'
      +(catRows.length?tb(['Categoria','Ferramentas'],catRows):co('Nenhuma ferramenta detectada — setup vazio ou inacessivel.'))
      +'<div class="gr gr--2" style="margin-top:.75rem">'
      +cd('IDs de Conta',
        [['GTM',ids.gtm],['GA4',ids.ga4],['UA (legado)',ids.ua],['Google Ads',ids.google_ads],['Meta Pixel',ids.meta_pixel],['TikTok Pixel',ids.tiktok_pixel],['LinkedIn',ids.linkedin_partner]]
          .filter(p=>(p[1]||[]).length).map(p=>'<div style="margin-bottom:.25rem"><strong>'+E(p[0])+':</strong> '+(p[1]||[]).map(E).join(', ')+'</div>').join('')
          ||'<em style="color:var(--text-muted)">Nenhum ID de conta encontrado</em>')
      +(ts.setup_diagnosis?cd('Diagnóstico do Setup',E(ts.setup_diagnosis),'yellow'):'')
      +'</div>');
  }

  // ========== EVENTS FIRED ==========
  if (d.events_fired) {
    const ef = d.events_fired;
    const ga4 = ef.ga4_event_names || [];
    const meta = ef.meta_event_names || [];
    const missing = ef.expected_events_missing || [];
    h += sc('Eventos Disparados (capturados via network)',
      '<div class="gr gr--2">'
      +cd('GA4 ('+(ef.ga4_event_count||0)+' eventos)',
        ga4.length?ga4.map(n=>'<span class="tg tg--green" style="margin:.1rem .2rem .1rem 0">'+E(n)+'</span>').join(''):'<em style="color:var(--danger)">Nenhum evento GA4 capturado.</em>',
        ga4.length?'green':'danger')
      +cd('Meta Pixel ('+(ef.meta_event_count||0)+' eventos)',
        meta.length?meta.map(n=>'<span class="tg tg--green" style="margin:.1rem .2rem .1rem 0">'+E(n)+'</span>').join(''):'<em style="color:var(--danger)">Nenhum evento Meta Pixel capturado.</em>',
        meta.length?'green':'danger')
      +'</div>'
      +(missing.length?'<div class="co" style="margin-top:.75rem"><strong style="color:var(--danger)">Eventos esperados ausentes:</strong> '+missing.map(E).join(', ')+'</div>':'')
      +(ef.events_diagnosis?co(ef.events_diagnosis):''));
  }

  // ========== QUALITY FLAGS ==========
  if (d.quality_flags && d.quality_flags.length) {
    const sevLabel = {critical:'CRÍTICO',high:'ALTO',medium:'MÉDIO',low:'BAIXO'};
    const sevColor = {critical:'red',high:'red',medium:'yellow',low:'gray'};
    const flagRows = d.quality_flags.map(f=>[
      tg(sevLabel[f.severity]||f.severity,sevColor[f.severity]||'gray'),
      '<strong>'+E(f.title)+'</strong>',
      E(f.detail)
    ]);
    h += sc('Red Flags de Qualidade do Tagueamento', tb(['Severidade','Problema','Detalhe'], flagRows));
  } else if (d.tracking_stack) {
    h += sc('Red Flags de Qualidade do Tagueamento',
      insight('','Nenhum red flag critico detectado no setup de tagueamento.','good'));
  }

  // ========== CRO ELEMENTS DEEP ==========
  if (d.cro_elements_deep) {
    const ce = d.cro_elements_deep;
    const cd_ = ce.desktop || {};
    const cm = ce.mobile || {};

    // CTAs + forms + WhatsApp
    h += sc('Elementos de Conversão (análise dinâmica)',
      '<div class="gr gr--4">'
      +mt(cd_.cta_count??'—','CTAs (desktop)',cd_.cta_count>=3?'green':cd_.cta_count>=1?'yellow':'red')
      +mt(cd_.cta_above_fold??'—','CTAs above-fold (desktop)',cd_.cta_above_fold>=1?'green':'red')
      +mt(cd_.form_count??'—','Forms na pagina',cd_.form_count>=1?'green':'yellow')
      +mt((cd_.whatsapp_links||[]).length||'—','Links WhatsApp',(cd_.whatsapp_links||[]).length?'green':'yellow')
      +'</div>'
      +(cd_.form_count?'<div class="gr gr--3" style="margin-top:.5rem">'
        +mt(cd_.avg_fields_per_form??'—','Campos/form (média)',cd_.avg_fields_per_form<=5?'green':cd_.avg_fields_per_form<=8?'yellow':'red')
        +mt((cd_.forms||[]).every(f=>f.has_consent_checkbox)?'Sim':'Não','Consent LGPD em forms',(cd_.forms||[]).every(f=>f.has_consent_checkbox)?'green':'red')
        +mt((cd_.videos||[]).length||'0','Vídeos','')
      +'</div>':'')
      +(ce.cta_diagnosis?co(ce.cta_diagnosis):'')
      +(ce.form_diagnosis?co(ce.form_diagnosis):''));

    // Social proof + trust
    const sp = cd_.social_proof || {};
    const tr = cd_.trust || {};
    const up = cd_.urgency || {};
    const spYes = Object.values(sp).filter(v=>v===true).length;
    const spTotal = Object.keys(sp).length;
    const trYes = Object.values(tr).filter(v=>v===true).length;
    const trTotal = Object.keys(tr).length;
    const check = (v,lbl) => mt(v?'✓':'✗',lbl,v?'green':'red');
    h += sc('Prova Social, Confiança e Urgência',
      '<div class="gr gr--2">'
      +cd('Prova Social ('+spYes+'/'+spTotal+')',
        '<div class="gr gr--1">'
        +check(sp.has_testimonials,'Depoimentos')
        +check(sp.has_ratings,'Avaliações/estrelas')
        +check(sp.has_numbers,'Números de resultado')
        +check(sp.has_certifications,'Certificações/selos')
        +check(sp.has_logos_clients,'Logos de clientes')
        +'</div>',
        spYes>=3?'green':spYes>=1?'yellow':'danger')
      +cd('Confiança Institucional ('+trYes+'/'+trTotal+')',
        '<div class="gr gr--1">'
        +check(tr.has_cnpj,'CNPJ visível')
        +check(tr.has_address,'Endereço físico')
        +check(tr.has_phone,'Telefone (link tel:)')
        +check(tr.has_email,'Email (link mailto:)')
        +check(tr.has_privacy_link,'Política de Privacidade')
        +check(tr.has_terms_link,'Termos de Uso')
        +'</div>',
        trYes>=4?'green':trYes>=2?'yellow':'danger')
      +'</div>'
      +'<div class="gr gr--3" style="margin-top:.5rem">'
      +check(up.has_countdown,'Countdown/timer')
      +check(up.has_limited,'Menção a vagas/oferta limitada')
      +check(up.has_discount,'Desconto/promoção')
      +'</div>'
      +(ce.social_proof_diagnosis?co(ce.social_proof_diagnosis):'')
      +(ce.trust_diagnosis?co(ce.trust_diagnosis):''));
  }

  // ========== COMPLIANCE LGPD ==========
  if (d.compliance_lgpd) {
    const c = d.compliance_lgpd;
    const statusLabel = {compliant:'Em conformidade',partial:'Parcialmente conforme',non_compliant:'NÃO conforme'};
    const statusTone = {compliant:'good',partial:'warn',non_compliant:'bad'};
    const statusColor = {compliant:'green',partial:'yellow',non_compliant:'red'};
    h += sc('Compliance LGPD',
      '<div class="gr gr--3" style="margin-bottom:.75rem">'
      +mt(statusLabel[c.status]||c.status,'Status',statusColor[c.status]||'gray')
      +mt(c.has_cmp?'Sim ('+(c.cmps_detected||[]).join(', ')+')':'Não','CMP detectado',c.has_cmp?'green':'red')
      +mt(c.pre_consent_tracker_count??'—','Trackers pré-consent',c.pre_consent_tracker_count===0?'green':c.pre_consent_tracker_count<=2?'yellow':'red')
      +'</div>'
      +(c.score!=null?insight(scoreBar(c.score,10,{title:'LGPD Score',caption:'Referência: 7+/10 = CMP ativo + zero scripts pré-consent'}),
        c.status==='compliant'?'Site em conformidade com LGPD — manter auditoria anual.':
        c.status==='partial'?'CMP instalado mas scripts vazam dados antes do consentimento. Ajustar triggers do GTM para checar consent state.':
        'URGENTE: sem CMP e com trackers disparando pré-consent. Risco de multa ANPD até R$50M ou 2% do faturamento. Instalar Cookiebot (gratis até 500k pageviews) ou OneTrust.',
        statusTone[c.status]||'warn'):'')
      +(c.issues?.length?'<div class="co" style="margin-top:.75rem"><strong>Issues detectadas:</strong><ul style="margin:.5rem 0 0 1.25rem">'+c.issues.map(x=>'<li>'+E(x)+'</li>').join('')+'</ul></div>':'')
      +(c.recommendation?co('<strong>Recomendação:</strong> '+c.recommendation):''));
  }

  if (d.copy_audit?.above_fold) {
    const af = d.copy_audit.above_fold;
    h += sc('Above the Fold',
      '<div class="gr gr--3">'
      +mt(af.value_prop_clear?'Sim':'Não','Proposta Clara',af.value_prop_clear?'green':'red')
      +mt(af.cta_visible?'Sim':'Não','CTA Visível',af.cta_visible?'green':'red')
      +mt(af.headline_complete?'Sim':'Não','Headline Completa',af.headline_complete?'green':'red')
      +'</div>'
      +(af.suggested_headline?cd('Headline Sugerida',E(af.suggested_headline),'green'):''));
  }
  if (d.trust_analysis) {
    const ta = d.trust_analysis;
    const trustTone = ta.trust_score>=7?'good':ta.trust_score>=4?'warn':'bad';
    const trustInsight = ta.trust_score!=null
      ? 'Trust score '+ta.trust_score+'/10. '
        +(ta.trust_score>=7?'LP transmite confiança — manter e reforçar elementos fortes.'
          :ta.trust_score>=4?'Brechas de confiança custam conversão — priorizar prova social e elementos de credibilidade.'
          :'CRÍTICO: sem elementos mínimos de confiança a LP vai converter mal independente do tráfego.')
      : '';
    h += sc('Confiança',
      (ta.trust_score!=null

'ee-s3-copy-anuncios'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);
  if (d.total_variations) h += mt(d.total_variations,'Total de Variações','red');
  if (d.funnel_stages?.length) {
    const fn = {topo_de_funil:'Topo de Funil',meio_de_funil:'Meio de Funil',fundo_de_funil:'Fundo de Funil',remarketing:'Remarketing'};
    // Donut: distribuição de variações por estágio
    const toneByStage = {topo_de_funil:'blue',meio_de_funil:'yellow',fundo_de_funil:'green',remarketing:'red'};
    const stageData = d.funnel_stages.map(s=>{
      const count = (s.platforms||[]).reduce((sum,p)=>sum+(p.variations?.length||0),0);
      return {label: fn[s.name]||s.name, value: count, tone: toneByStage[s.name]||'gray'};
    }).filter(x=>x.value>0);
    if (stageData.length >= 2) {
      const top = [...stageData].sort((a,b)=>b.value-a.value)[0];
      const fund = stageData.find(x=>x.label.includes('Fundo'));
      const distInsight = 'Maior volume em "'+top.label+'" ('+top.value+' variações). '
        +(fund && fund.value < top.value/2 ? 'Atenção: fundo de funil sub-representado — leads quentes podem ficar sem copy dedicada.' : 'Mix coerente entre etapas.');
      h += sc('Distribuição de Copy por Estágio',
        insight(chartDonut(stageData, {title:'Variações por Funil'}),
          distInsight, fund && fund.value < top.value/2 ? 'warn' : 'good'));
    }
    d.funnel_stages.forEach(stage => {
      let rows = [];
      (stage.platforms||[]).forEach(plat => {
        (plat.variations||[]).forEach(v => {
          rows.push([E(plat.name),E(v.type),E(v.headline||v.text||'').substring(0,80)+(v.headline?.length>80?'...':''),E(v.cta||'')]);
        });
      });
      if (rows.length) h += sc((fn[stage.name]||stage.name)+' — '+E(stage.tone||''), tb(['Plataforma','Tipo','Copy','CTA'],rows));
    });
  }
  if (d.copy_rules_applied?.length) {
    h += sc('Regras Aplicadas', '<ul class="cl">'+d.copy_rules_applied.map(r=>'<li><span class="cl__icon cl__icon--done">&#10003;</span><span>'+E(r)+'</span></li>').join('')+'</ul>');
  }
  return h;
},

'ee-s4-diagnostico-comercial'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);
  if (d.funnel_diagnosis?.length) {
    // Funnel: simular volume decaindo com base em current_rate
    let simVol = 100;
    const funnelStages = d.funnel_diagnosis.map((f,i)=>{
      const stage = {name: f.stage, volume: Math.round(simVol), highlight: f.status==='critical'||f.status==='low'};
      if (f.current_rate!=null) simVol = simVol * f.current_rate;
      return stage;
    });
    // Pior gap
    const worst = [...d.funnel_diagnosis].filter(f=>f.gap!=null).sort((a,b)=>a.gap-b.gap)[0];
    const funnelInsight = worst
      ? 'Maior gargalo: "'+worst.stage+'" com gap de '+worst.gap.toFixed(1)+'pp vs benchmark. '+(worst.bottleneck||'').substring(0,100)
      : '';
    h += sc('Funil de Vendas',
      insight(chartFunnel(funnelStages, {title:'Afunilamento (% retenção)', fmt:v=>v+'%'}),
        funnelInsight, worst && worst.gap<-10?'bad':worst && worst.gap<0?'warn':'good')
      +tb(['Etapa','Taxa Atual','Benchmark','Gap','Status','Gargalo'],
      d.funnel_diagnosis.map(f=>[E(f.stage),PCT(f.current_rate),PCT(f.benchmark),
        '<span style="color:var(--'+(f.gap>=0?'success':'danger')+')">'+((f.gap>=0?'+':'')+N(f.gap))+'pp</span>',
        tg(CLS[f.status]||f.status,CLC[f.status]),E(f.bottleneck)])));
  }
  if (d.primary_bottleneck) {
    h += cd('Gargalo Principal','<strong>'+E(d.primary_bottleneck.stage)+':</strong> '+E(d.primary_bottleneck.description)
      +'<div class="cd__meta">'+E(d.primary_bottleneck.estimated_improvement)+'</div>','danger');
  }
  if (d.objection_map?.length) {
    h += sc('Mapa de Objeções', d.objection_map.map(o=>
      cd(o.objection+' '+tg(o.type,{price:'red',urgency:'yellow',authority:'gray',trust:'yellow',need:'red',competitor:'yellow'}[o.type]),
        '<strong>Resposta:</strong> '+E(o.recommended_response)+'<br><strong>Prevenção SDR:</strong> '+E(o.sdr_prevention),
        {price:'danger',trust:'yellow'}[o.type])
    ).join(''));
  }
  if (d.qualification_criteria) {
    const qc = d.qualification_criteria;
    const renderStar = (label, data, color) => data ? cd(label,
      E(data.profile)+(data.mandatory_signals||data.signals?'<ul style="margin:.5rem 0 0;padding-left:1rem">'
      +(data.mandatory_signals||data.signals||[]).map(s=>'<li style="font-size:.8125rem">'+E(s)+'</li>').join('')+'</ul>':'')
      +'<div class="cd__meta">Ação: '+E(data.action)+'</div>',color) : '';
    h += sc('Critérios de Qualificação', renderStar('5 Estrelas',qc.five_star,'green')
      +renderStar('4 Estrelas',qc.four_star,'green')+renderStar('3 Estrelas',qc.three_star,'yellow')
      +renderStar('1-2 Estrelas',qc.one_two_star,'danger'));
  }
  return h;
},

    h += '<div class="gr gr--3">'

    // Gauge da nota geral vs benchmark 7/10
    const ocTone = s>=7?'good':s>=4?'warn':'bad';
    const ocInsight = 'Nota '+s.toFixed(1)+'/10. '
      +(s>=7?'Atendimento saudável — refinar scripts para escalar consistência.'
        :s>=4?'Atendimento inconsistente — gaps em qualificação e follow-up custam conversão.'
        :'CRÍTICO: prejuízo direto em conversão. Intervenção de processo imediata.');
    h += insight(chartGauge(s, 7, 10, {title:'Nota do Atendimento', fmt:v=>v.toFixed(1)+'/10'}), ocInsight, ocTone);
  }
  if (d.buyer_profile) {
    const b = d.buyer_profile;
    h += sc('Perfil do Comprador', cd(b.name,
      '<strong>Situação:</strong> '+E(b.situation)+'<br>'
      +'<strong>Urgência:</strong> '+tg(b.urgency,{high:'red',medium:'yellow',low:'green'}[b.urgency])+' '
      +'<strong>Objeção:</strong> '+E(b.main_objection),'red'));
  }
  if (d.evaluation?.criteria_scores?.length) {
    const critBars = d.evaluation.criteria_scores.map(c=>({
      label: c.criterion,
      value: c.score,
      tone: c.score>=7?'green':c.score>=4?'yellow':'red',
    }));
    const critInsight = (() => {
      const weakest = [...critBars].sort((a,b)=>a.value-b.value)[0];
      const avg = critBars.reduce((s,x)=>s+x.value,0)/critBars.length;
      return weakest
        ? 'Critério mais fraco: "'+weakest.label+'" ('+weakest.value+'/10). Média geral: '+avg.toFixed(1)+'/10 — focar aqui primeiro para puxar a nota geral.'
        : '';
    })();
    h += sc('Scores por Critério',
      insight(chartHBar(critBars, {title:'Avaliação por Dimensão', fmt:v=>v+'/10', labelWidth:160}),
        critInsight, critBars.some(x=>x.value<4)?'bad':critBars.some(x=>x.value<7)?'warn':'good')
      +'<div class="gr gr--2">'+d.evaluation.criteria_scores.map(c=>
        '<div class="cd"><div class="cd__title">'+E(c.criterion)+' <span style="color:var(--'+(c.score>=7?'success':c.score>=4?'warning':'danger')+')">'+c.score+'/10</span></div>'
        +'<div class="cd__body">'+E(c.observation)+'</div></div>'
      ).join('')+'</div>');
  }
  if (d.evaluation?.strengths?.length || d.evaluation?.critical_improvements?.length) {
    h += sc('Pontos Fortes & Melhorias', '<div class="gr gr--2">'
      +cd('Pontos Fortes',(d.evaluation.strengths||[]).map(s=>'<div style="margin-bottom:.25rem;color:var(--success)">&#10003; '+E(s)+'</div>').join(''),'green')
      +cd('Melhorias Críticas',(d.evaluation.critical_improvements||[]).map(s=>'<div style="margin-bottom:.25rem;color:var(--danger)">&#10007; '+E(s)+'</div>').join(''),'danger')
      +'</div>');
  }
  if (d.evaluation?.sdr_impact_per_improvement?.length) {
    h += sc('Impacto do SDR IA', tb(['Melhoria','Solução SDR','Impacto'],
      d.evaluation.sdr_impact_per_improvement.map(i=>[E(i.improvement),E(i.sdr_solution),tg(i.estimated_impact,'green')])));
  }
  return h;
},

'ee-s5-sdr-ia-config'(d) {
  let h = '';
  if (d.summary) h += sm(d.summary);
  if (d.patagon_config) {
    const p = d.patagon_config;
    h += '<div class="gr gr--2">'+mt(p.agent_name||'—','Agente Patagon','red')
      +(d.overall_test_result?mt(d.overall_test_result==='approved'?'Aprovado':d.overall_test_result==='needs_adjustments'?'Ajustes':'Falhou','Resultado dos Testes',
        {approved:'green',needs_adjustments:'yellow',failed:'red'}[d.overall_test_result]):'')
      +'</div>';
  }
  if (d.kommo_integration) {
    const k = d.kommo_integration;
    h += sc('Integração Kommo', '<div class="gr gr--3">'
      +mt(k.api_configured?'Conectado':'Pendente','API Kommo',k.api_configured?'green':'red')
      +mt(k.pipeline_name||'—','Pipeline','')
      +'</div>'
      +(k.field_mapping?.length?tb(['Campo Patagon','Campo Kommo','Tipo'],
        k.field_mapping.map(f=>[E(f.patagon_field),E(f.kommo_field),E(f.field_type)])):''));
  }
  if (d.alerts_config) {
    const a = d.alerts_config;
    h += sc('Alertas', '<div class="gr gr--3">'
      +mt(a.sla_minutes?a.sla_minutes+'min':'—','SLA Resposta','red')
      +mt(E(a.seller_name||'—'),'Vendedor','')
      +(a.business_hours?mt(E((a.business_hours.start||'')+'–'+(a.business_hours.end||'')),'Horário',''):'')
      +'</div>');
  }
  if (d.test_results?.length) {
    const sc2 = {pass:'green',fail:'danger',partial:'yellow'};
    // Donut do status dos testes
    const statusCount = {};

    const statusLabel = {pass:'Passou',partial:'Parcial',fail:'Falhou'};
    const statusTone = {pass:'green',partial:'yellow',fail:'red'};
    const statusData = Object.keys(statusCount).map(k=>({
      label: statusLabel[k]||k, value: statusCount[k], tone: statusTone[k]||'gray',
    }));
    const passPct = Math.round(((statusCount.pass||0)/d.test_results.length)*100);
    const testInsight = passPct>=80
      ? passPct+'% dos testes passaram — configuração SDR pronta para produção.'
      : passPct>=50
        ? passPct+'% de aprovação — ajustes pontuais antes de ir ao ar.'
        : 'Apenas '+passPct+'% aprovados — config precisa ser refinada antes de expor a leads reais.';
    h += sc('Resultados dos Testes',
      (statusData.length >= 2
        ? insight(chartDonut(statusData, {title:'Distribuição de Status'}),
            testInsight, passPct>=80?'good':passPct>=50?'warn':'bad')
        : '')
      +tb(['#','Perfil','Score','Kommo','Alerta','Tempo','Tom','Status'],
      d.test_results.map(t=>[E(t.lead_number),E(t.profile_description||''),E(t.score),
        t.kommo_entry?tg('OK','green'):tg('Falha','danger'),
        t.alert_sent?tg('Enviado','green'):tg('—','gray'),
        E(t.response_time),t.tone_consistent?tg('OK','green'):tg('Falha','danger'),
        tg(t.status,sc2[t.status])])));
  }
  if (d.issues_found?.length) {
    h += sc('Problemas Encontrados', '<ul class="cl">'+d.issues_found.map(i=>'<li><span class="cl__icon cl__icon--blocked">&#10007;</span><span>'+E(i)+'</span></li>').join('')+'</ul>');
  }
  return h;
},
