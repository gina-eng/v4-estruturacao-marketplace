# Signatures para deteccao de ferramentas e plataformas
# Cada entrada tem:
#   id: identificador curto
#   name: nome exibido
#   category: tracking|analytics|ads|heatmap|chat|cms|ecommerce|framework|lp_builder|cmp
#   url_patterns: lista de substrings em request URLs (network)
#   window_globals: lista de props em window
#   dom_selectors: lista de CSS selectors para buscar no HTML
#   cookies: lista de nomes de cookies
#   headers: dict {header_name: regex} a checar nas responses
#   notes: observacoes

tools:
  # ============ TAG MANAGERS ============
  - id: gtm
    name: Google Tag Manager
    category: tracking
    url_patterns:
      - googletagmanager.com/gtm.js
      - googletagmanager.com/gtag/js
    window_globals:
      - google_tag_manager
      - dataLayer
    notes: "Container ID vem no query string 'id=GTM-XXXXXX'"

  - id: gtm_server
    name: GTM Server-Side
    category: tracking
    url_patterns:
      - sgtm.
      - server-gtm
    notes: "Geralmente subdominio custom sgtm.{cliente}.com"

  # ============ ANALYTICS ============
  - id: ga4
    name: Google Analytics 4
    category: analytics
    url_patterns:
      - google-analytics.com/g/collect
      - analytics.google.com/g/collect
    window_globals:
      - gtag
    notes: "Measurement ID G-XXXXXXXXXX. Eventos via /g/collect?tid=G-XXX&en=event_name"

  - id: ga_ua
    name: Google Analytics UA (LEGACY)
    category: analytics
    url_patterns:
      - google-analytics.com/collect
      - google-analytics.com/j/collect
      - google-analytics.com/analytics.js
      - google-analytics.com/urchin.js
    window_globals:
      - ga
      - _gaq
    notes: "RED FLAG: UA descontinuado em 2023. Se detectar, cliente nao tem dados ha 1+ ano."

  # ============ META / FACEBOOK ============
  - id: meta_pixel
    name: Meta Pixel
    category: ads
    url_patterns:
      - connect.facebook.net/en_US/fbevents.js
      - connect.facebook.net/pt_BR/fbevents.js
      - facebook.com/tr
      - facebook.com/tr/
    window_globals:
      - fbq
      - _fbq
    notes: "Pixel ID no query string. Eventos padrao: PageView, Lead, Purchase, AddToCart, ViewContent"

  - id: meta_capi
    name: Meta CAPI (Conversions API)
    category: ads
    url_patterns:
      - graph.facebook.com/v
    notes: "Server-side. Detectar via logs do servidor (nao aparece no network do browser)"

  # ============ GOOGLE ADS ============
  - id: google_ads_conversion
    name: Google Ads Conversion
    category: ads
    url_patterns:
      - googleadservices.com/pagead/conversion
      - googleads.g.doubleclick.net/pagead/viewthroughconversion
    notes: "Conversion ID AW-XXXXX. Dispara em paginas de obrigado/agradecimento."

  - id: google_ads_remarketing
    name: Google Ads Remarketing
    category: ads
    url_patterns:
      - googleadservices.com/pagead/conversion_async
      - googleads.g.doubleclick.net/pagead/id
    notes: "Tag de remarketing (diferente de conversao)."

  # ============ OUTROS PIXELS ============
  - id: tiktok_pixel
    name: TikTok Pixel
    category: ads
    url_patterns:
      - analytics.tiktok.com/i18n/pixel
      - analytics.tiktok.com/api/v2/pixel
    window_globals:
      - ttq

  - id: pinterest_tag
    name: Pinterest Tag
    category: ads
    url_patterns:
      - ct.pinterest.com
      - s.pinimg.com/ct
    window_globals:
      - pintrk

  - id: linkedin_insight
    name: LinkedIn Insight Tag
    category: ads
    url_patterns:
      - snap.licdn.com/li.lms-analytics/insight.min.js
      - px.ads.linkedin.com
    window_globals:
      - _linkedin_data_partner_ids

  - id: twitter_pixel
    name: X (Twitter) Pixel
    category: ads
    url_patterns:
      - static.ads-twitter.com/uwt.js
      - analytics.twitter.com
    window_globals:
      - twq

  # ============ HEATMAPS & SESSION ============
  - id: clarity
    name: Microsoft Clarity
    category: heatmap
    url_patterns:
      - clarity.ms/tag
      - c.clarity.ms/collect
    window_globals:
      - clarity

  - id: hotjar
    name: Hotjar
    category: heatmap
    url_patterns:
      - static.hotjar.com
      - script.hotjar.com
    window_globals:
      - hj
      - _hjSettings

  - id: mouseflow
    name: Mouseflow
    category: heatmap
    url_patterns:
      - cdn.mouseflow.com
    window_globals:
      - _mfq

  - id: fullstory
    name: FullStory
    category: heatmap
    url_patterns:
      - edge.fullstory.com
    window_globals:
      - FS

  # ============ CHAT / CRM ============
  - id: intercom
    name: Intercom
    category: chat
    url_patterns:
      - widget.intercom.io
      - api-iam.intercom.io
    window_globals:
      - Intercom

  - id: hubspot
    name: HubSpot
    category: chat
    url_patterns:
      - js.hs-scripts.com
      - js.hsforms.net
      - js.hs-analytics.net
    window_globals:
      - _hsq
      - HubSpotConversations

  - id: rdstation
    name: RD Station
    category: tracking
    url_patterns:
      - d335luupugsy2.cloudfront.net
      - app.rdstation.com.br
    window_globals:
      - RdstationPopup
      - RDStationForms

  - id: zendesk
    name: Zendesk Chat
    category: chat
    url_patterns:
      - static.zdassets.com
      - v2.zopim.com
    window_globals:
      - zE
      - $zopim

  - id: crisp
    name: Crisp
    category: chat
    url_patterns:
      - client.crisp.chat
    window_globals:
      - $crisp

  - id: jivochat
    name: JivoChat
    category: chat
    url_patterns:
      - code.jivosite.com
    window_globals:
      - jivo_api

  - id: tawk
    name: Tawk.to
    category: chat
    url_patterns:
      - embed.tawk.to
    window_globals:
      - Tawk_API

  - id: whatsapp_widget
    name: WhatsApp Click-to-Chat
    category: chat
    dom_selectors:
      - 'a[href*="wa.me/"]'
      - 'a[href*="api.whatsapp.com/send"]'
      - 'a[href*="web.whatsapp.com"]'

  # ============ CMP / CONSENT ============
  - id: onetrust
    name: OneTrust (CMP)
    category: cmp
    url_patterns:
      - cdn.cookielaw.org
      - geolocation.onetrust.com
    window_globals:
      - OneTrust
      - OptanonConsent

  - id: cookiebot
    name: Cookiebot (CMP)
    category: cmp
    url_patterns:
      - consent.cookiebot.com
      - consentcdn.cookiebot.com
    window_globals:
      - Cookiebot

  - id: usercentrics
    name: Usercentrics (CMP)
    category: cmp
    url_patterns:
      - app.usercentrics.eu
      - privacy-proxy.usercentrics.eu
    window_globals:
      - UC_UI

  - id: trustarc
    name: TrustArc (CMP)
    category: cmp
    url_patterns:
      - consent.trustarc.com

  - id: termly
    name: Termly (CMP)
    category: cmp
    url_patterns:
      - app.termly.io

  # ============ CMS / PLATFORMS ============
  - id: wordpress
    name: WordPress
    category: cms
    url_patterns:
      - /wp-content/
      - /wp-includes/
      - /wp-json/
    dom_selectors:
      - 'meta[name="generator"][content*="WordPress"]'
      - 'link[href*="wp-content"]'

  - id: elementor
    name: Elementor
    category: cms
    url_patterns:
      - /elementor/
    dom_selectors:
      - '[data-elementor-type]'
      - 'link[href*="elementor"]'
    window_globals:
      - elementorFrontend

  - id: divi
    name: Divi (WP Theme)
    category: cms
    dom_selectors:
      - 'link[href*="Divi"]'
      - '[class*="et_pb_"]'

  - id: shopify
    name: Shopify
    category: ecommerce
    url_patterns:
      - cdn.shopify.com
      - shopify.com/s/files
    dom_selectors:
      - 'meta[name="shopify-checkout-api-token"]'
    window_globals:
      - Shopify

  - id: vtex
    name: VTEX
    category: ecommerce
    url_patterns:
      - vtexcommercestable.com.br
      - vteximg.com.br
      - myvtex.com
    window_globals:
      - vtex
      - vtexjs

  - id: woocommerce
    name: WooCommerce
    category: ecommerce
    dom_selectors:
      - 'body.woocommerce'
      - 'link[href*="woocommerce"]'
    url_patterns:
      - /wp-content/plugins/woocommerce

  - id: magento
    name: Magento
    category: ecommerce
    url_patterns:
      - /static/version
      - /mage/
    dom_selectors:
      - 'script[src*="/mage/"]'

  - id: nuvemshop
    name: Nuvemshop
    category: ecommerce
    url_patterns:
      - nuvemshop.com.br
      - d26lpennugtm8s.cloudfront.net
    dom_selectors:
      - 'meta[name="generator"][content*="Tiendanube"]'

  - id: yampi
    name: Yampi
    category: ecommerce
    url_patterns:
      - yampi.com.br
      - yampi.io

  - id: tray
    name: Tray Commerce
    category: ecommerce
    url_patterns:
      - tray.com.br
      - commercesuite.com.br

  # ============ FRAMEWORKS / LP BUILDERS ============
  - id: nextjs
    name: Next.js
    category: framework
    url_patterns:
      - /_next/static/
    dom_selectors:
      - 'script#__NEXT_DATA__'
    window_globals:
      - __NEXT_DATA__

  - id: react
    name: React (generic)
    category: framework
    dom_selectors:
      - '[data-reactroot]'
      - '[data-reactid]'
    window_globals:
      - React

  - id: vue
    name: Vue.js
    category: framework
    dom_selectors:
      - '[data-v-app]'
    window_globals:
      - Vue

  - id: webflow
    name: Webflow
    category: lp_builder
    url_patterns:
      - assets.website-files.com
      - uploads-ssl.webflow.com
    dom_selectors:
      - 'html[data-wf-site]'
      - 'html[data-wf-page]'

  - id: unbounce
    name: Unbounce
    category: lp_builder
    url_patterns:
      - d9hhrg4mnvzow.cloudfront.net
      - unbouncepages.com

  - id: instapage
    name: Instapage
    category: lp_builder
    url_patterns:
      - instapage.com
      - inspcdn.net

  - id: klickpages
    name: Klickpages
    category: lp_builder
    url_patterns:
      - klickpages.com.br
      - klickarte.com.br

  - id: leadlovers
    name: LeadLovers
    category: lp_builder
    url_patterns:
      - leadlovers.com
      - llcdn.com.br

  # ============ SERVER / HOSTING HEADERS ============
  - id: cloudflare
    name: Cloudflare
    category: hosting
    headers:
      server: 'cloudflare'
    cookies:
      - __cf_bm
      - cf_clearance

  - id: litespeed
    name: LiteSpeed
    category: hosting
    headers:
      server: '(?i)litespeed'

  - id: nginx
    name: Nginx
    category: hosting
    headers:
      server: '(?i)nginx'

  - id: vercel
    name: Vercel
    category: hosting
    headers:
      server: '(?i)vercel'
      x-vercel-id: '.+'
